<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plánovač aktivít</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F0F4F8;
    --card: #FFFFFF;
    --primary: #3B5BDB;
    --primary-light: #E8EDFF;
    --border: #E2E8F0;
    --text: #1A202C;
    --muted: #718096;
    --today: #3B5BDB;
    --danger: #E53E3E;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--primary);
    color: #fff;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(59,91,219,.3);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; }
  .header-actions { display: flex; gap: 8px; }
  .btn-icon {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: .85rem;
    cursor: pointer;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-icon:hover { background: rgba(255,255,255,.35); }

  /* ── LAYOUT ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 16px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
  }
  @media(max-width: 800px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }

  /* ── CALENDAR CARD ── */
  .cal-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .cal-nav h2 { font-size: 1.15rem; font-weight: 700; }
  .nav-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .nav-btn:hover { background: var(--primary-light); border-color: var(--primary); }

  .cal-days-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .cal-days-header span {
    text-align: center;
    font-size: .72rem;
    font-weight: 700;
    color: var(--muted);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .cal-days-header span:first-child,
  .cal-days-header span:last-child { color: #E53E3E; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-cell {
    min-height: 90px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    cursor: pointer;
    transition: background .1s;
    position: relative;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: var(--primary-light); }
  .cal-cell.other-month { background: #F8FAFC; }
  .cal-cell.other-month .day-num { color: #CBD5E0; }
  .cal-cell.today { background: #EBF4FF; }
  .cal-cell.today .day-num {
    background: var(--today);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-cell.weekend .day-num { color: #E53E3E; }
  .cal-cell.other-month.weekend .day-num { color: #FCA5A5; }

  .day-num {
    font-size: .8rem;
    font-weight: 700;
    color: var(--text);
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }

  .event-chip {
    display: block;
    font-size: .68rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    color: #fff;
    line-height: 1.4;
  }
  .event-chip:hover { opacity: .85; }
  .more-events {
    font-size: .65rem;
    color: var(--muted);
    padding: 1px 4px;
    font-weight: 600;
  }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }

  .panel {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-body { padding: 12px; }

  /* colleagues */
  .kolega-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 8px;
    transition: background .1s;
  }
  .kolega-item:hover { background: var(--bg); }
  .kolega-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .kolega-name { font-size: .88rem; font-weight: 500; flex: 1; }
  .kolega-del {
    width: 20px; height: 20px;
    border: none;
    background: none;
    color: #CBD5E0;
    cursor: pointer;
    border-radius: 4px;
    font-size: .9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .kolega-del:hover { background: #FEE2E2; color: var(--danger); }

  .add-kolega-form {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .add-kolega-form input[type=text] {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: .82rem;
    outline: none;
    transition: border-color .15s;
  }
  .add-kolega-form input[type=text]:focus { border-color: var(--primary); }
  .add-kolega-form input[type=color] {
    width: 30px; height: 30px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
  }
  .btn-add {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-add:hover { opacity: .85; }

  /* upcoming events */
  .upcoming-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-date {
    text-align: center;
    min-width: 38px;
    background: var(--primary-light);
    border-radius: 8px;
    padding: 4px 2px;
  }
  .upcoming-date .ud-day { font-size: 1rem; font-weight: 800; color: var(--primary); line-height: 1; }
  .upcoming-date .ud-mon { font-size: .6rem; font-weight: 600; color: var(--primary); text-transform: uppercase; }
  .upcoming-info { flex: 1; min-width: 0; }
  .upcoming-title { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upcoming-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .upcoming-color { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    overflow: hidden;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { font-size: 1rem; font-weight: 700; }
  .modal-close {
    width: 30px; height: 30px;
    border: none; background: var(--bg);
    border-radius: 8px; font-size: 1rem;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: .9rem;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    color: var(--text);
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--primary); }
  .form-group textarea { min-height: 70px; resize: vertical; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 16px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger {
    background: #FEE2E2;
    color: var(--danger);
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    margin-right: auto;
  }
  .btn-danger:hover { background: #FECACA; }

  .kolega-select-opt { display: flex; align-items: center; gap: 6px; }
  .empty-upcoming { color: var(--muted); font-size: .85rem; text-align: center; padding: 12px 0; }
</style>
</head>
<body>

<header>
  <h1>📋 Plánovač pracovných aktivít</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="openNewEvent()">+ Nová udalosť</button>
  </div>
</header>

<div class="container">
  <!-- ── CALENDAR ── -->
  <div class="cal-card">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <h2 id="monthTitle"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-days-header">
      <span>Po</span><span>Ut</span><span>St</span>
      <span>Št</span><span>Pi</span><span>So</span><span>Ne</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <!-- colleagues panel -->
    <div class="panel">
      <div class="panel-header">Kolegovia</div>
      <div class="panel-body">
        <div id="kolegovia-list"></div>
        <div class="add-kolega-form">
          <input type="text" id="newKolegaMeno" placeholder="Meno kolegu…">
          <input type="color" id="newKolegaFarba" value="#4A90E2">
          <button class="btn-add" onclick="addKolega()">+</button>
        </div>
      </div>
    </div>

    <!-- upcoming panel -->
    <div class="panel">
      <div class="panel-header">Najbližšie udalosti</div>
      <div class="panel-body" id="upcoming-list"></div>
    </div>
  </div>
</div>

<!-- ── EVENT MODAL ── -->
<div class="overlay" id="eventOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nová udalosť</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Názov *</label>
        <input type="text" id="fNazov" placeholder="Napr. Porada tímu">
      </div>
      <div class="form-group">
        <label>Dátum *</label>
        <input type="date" id="fDatum">
      </div>
      <div class="time-row">
        <div class="form-group">
          <label>Čas od</label>
          <input type="time" id="fCasOd">
        </div>
        <div class="form-group">
          <label>Čas do</label>
          <input type="time" id="fCasTo">
        </div>
      </div>
      <div class="form-group">
        <label>Kolega</label>
        <select id="fKolega">
          <option value="">— nikto —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Poznámka</label>
        <textarea id="fPopis" placeholder="Voliteľný popis…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btnDelete" onclick="deleteEvent()" style="display:none">Vymazať</button>
      <button class="btn-secondary" onclick="closeModal()">Zrušiť</button>
      <button class="btn-primary" onclick="saveEvent()">Uložiť</button>
    </div>
  </div>
</div>

<script>
const MONTHS_SK = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];
const MONTHS_SK_GEN = ['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];

let now = new Date();
let curYear = now.getFullYear();
let curMonth = now.getMonth(); // 0-based
let events = [];
let kolegovia = [];
let editingId = null;

// ── DATA ──────────────────────────────────────────────────────────────────────

async function fetchKolegovia() {
  const res = await fetch('/api/kolegovia');
  kolegovia = await res.json();
  renderKolegovia();
  populateKolegaSelect();
}

async function fetchEvents() {
  const res = await fetch(`/api/udalosti?rok=${curYear}&mesiac=${curMonth + 1}`);
  events = await res.json();
  renderCalendar();
  renderUpcoming();
}

// ── RENDER CALENDAR ───────────────────────────────────────────────────────────

function renderCalendar() {
  const title = document.getElementById('monthTitle');
  title.textContent = `${MONTHS_SK[curMonth]} ${curYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // first day of month (adjust Mon=0)
  const first = new Date(curYear, curMonth, 1);
  let startDow = first.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon-based

  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const daysInPrev  = new Date(curYear, curMonth, 0).getDate();
  const todayStr = toDateStr(now);

  // events by date
  const byDate = {};
  events.forEach(e => {
    (byDate[e.datum] = byDate[e.datum] || []).push(e);
  });

  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';

    let date, isOther = false;
    if (i < startDow) {
      date = new Date(curYear, curMonth - 1, daysInPrev - startDow + i + 1);
      isOther = true;
    } else if (i >= startDow + daysInMonth) {
      date = new Date(curYear, curMonth + 1, i - startDow - daysInMonth + 1);
      isOther = true;
    } else {
      date = new Date(curYear, curMonth, i - startDow + 1);
    }

    const ds = toDateStr(date);
    const dow = date.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday = ds === todayStr;

    if (isOther) cell.classList.add('other-month');
    if (isToday) cell.classList.add('today');
    if (isWeekend) cell.classList.add('weekend');

    const dayNum = document.createElement('div');
    dayNum.className = 'day-num';
    dayNum.textContent = date.getDate();
    cell.appendChild(dayNum);

    const dayEvents = byDate[ds] || [];
    const maxShow = 3;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const chip = document.createElement('span');
      chip.className = 'event-chip';
      chip.style.background = ev.kolega_farba || '#718096';
      chip.textContent = (ev.cas_od ? ev.cas_od.slice(0,5) + ' ' : '') + ev.nazov;
      chip.onclick = e => { e.stopPropagation(); openEditEvent(ev); };
      cell.appendChild(chip);
    });
    if (dayEvents.length > maxShow) {
      const more = document.createElement('span');
      more.className = 'more-events';
      more.textContent = `+${dayEvents.length - maxShow} ďalšie`;
      cell.appendChild(more);
    }

    cell.onclick = () => openNewEvent(ds);
    grid.appendChild(cell);
  }
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────

function renderKolegovia() {
  const list = document.getElementById('kolegovia-list');
  list.innerHTML = '';
  kolegovia.forEach(k => {
    const item = document.createElement('div');
    item.className = 'kolega-item';
    item.innerHTML = `
      <span class="kolega-dot" style="background:${k.farba}"></span>
      <span class="kolega-name">${k.meno}</span>
      <button class="kolega-del" onclick="removeKolega(${k.id})" title="Odstrániť">✕</button>`;
    list.appendChild(item);
  });
}

function renderUpcoming() {
  const list = document.getElementById('upcoming-list');
  list.innerHTML = '';
  const todayStr = toDateStr(now);
  const upcoming = events
    .filter(e => e.datum >= todayStr)
    .sort((a,b) => (a.datum+a.cas_od||'').localeCompare(b.datum+b.cas_od||''))
    .slice(0, 6);

  if (!upcoming.length) {
    list.innerHTML = '<p class="empty-upcoming">Žiadne nadchádzajúce udalosti</p>';
    return;
  }

  upcoming.forEach(ev => {
    const d = new Date(ev.datum + 'T12:00:00');
    const item = document.createElement('div');
    item.className = 'upcoming-item';
    item.innerHTML = `
      <div class="upcoming-color" style="background:${ev.kolega_farba||'#CBD5E0'}"></div>
      <div class="upcoming-date">
        <div class="ud-day">${d.getDate()}</div>
        <div class="ud-mon">${MONTHS_SK[d.getMonth()].slice(0,3)}</div>
      </div>
      <div class="upcoming-info">
        <div class="upcoming-title">${ev.nazov}</div>
        <div class="upcoming-meta">${ev.cas_od ? ev.cas_od.slice(0,5) + (ev.cas_to ? '–'+ev.cas_to.slice(0,5) : '') + ' · ' : ''}${ev.kolega_meno||'—'}</div>
      </div>`;
    item.onclick = () => openEditEvent(ev);
    item.style.cursor = 'pointer';
    list.appendChild(item);
  });
}

function populateKolegaSelect() {
  const sel = document.getElementById('fKolega');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— nikto —</option>';
  kolegovia.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k.id;
    opt.textContent = k.meno;
    sel.appendChild(opt);
  });
  if (cur) sel.value = cur;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────

function openNewEvent(dateStr) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nová udalosť';
  document.getElementById('fNazov').value = '';
  document.getElementById('fDatum').value = dateStr || toDateStr(now);
  document.getElementById('fCasOd').value = '';
  document.getElementById('fCasTo').value = '';
  document.getElementById('fKolega').value = '';
  document.getElementById('fPopis').value = '';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('eventOverlay').classList.add('active');
  setTimeout(() => document.getElementById('fNazov').focus(), 50);
}

function openEditEvent(ev) {
  editingId = ev.id;
  document.getElementById('modalTitle').textContent = 'Upraviť udalosť';
  document.getElementById('fNazov').value = ev.nazov;
  document.getElementById('fDatum').value = ev.datum;
  document.getElementById('fCasOd').value = ev.cas_od || '';
  document.getElementById('fCasTo').value = ev.cas_do || '';
  document.getElementById('fKolega').value = ev.kolega_id || '';
  document.getElementById('fPopis').value = ev.popis || '';
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('eventOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('eventOverlay').classList.remove('active');
}

function overlayClick(e) {
  if (e.target === document.getElementById('eventOverlay')) closeModal();
}

async function saveEvent() {
  const nazov = document.getElementById('fNazov').value.trim();
  const datum = document.getElementById('fDatum').value;
  if (!nazov || !datum) { alert('Vyplňte názov a dátum.'); return; }

  const payload = {
    nazov,
    datum,
    cas_od: document.getElementById('fCasOd').value || null,
    cas_do: document.getElementById('fCasTo').value || null,
    kolega_id: document.getElementById('fKolega').value ? parseInt(document.getElementById('fKolega').value) : null,
    popis: document.getElementById('fPopis').value.trim() || null,
  };

  if (editingId) {
    await fetch(`/api/udalosti/${editingId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  } else {
    await fetch('/api/udalosti', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  }
  closeModal();
  fetchEvents();
}

async function deleteEvent() {
  if (!editingId) return;
  if (!confirm('Vymazať túto udalosť?')) return;
  await fetch(`/api/udalosti/${editingId}`, { method:'DELETE' });
  closeModal();
  fetchEvents();
}

// ── COLLEAGUES ────────────────────────────────────────────────────────────────

async function addKolega() {
  const meno = document.getElementById('newKolegaMeno').value.trim();
  const farba = document.getElementById('newKolegaFarba').value;
  if (!meno) return;
  await fetch('/api/kolegovia', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({meno, farba}) });
  document.getElementById('newKolegaMeno').value = '';
  await fetchKolegovia();
  fetchEvents();
}

async function removeKolega(id) {
  if (!confirm('Odstrániť kolegu? Udalosti zostanú, ale bez priradenenia.')) return;
  await fetch(`/api/kolegovia/${id}`, { method:'DELETE' });
  await fetchKolegovia();
  fetchEvents();
}

// ── NAV ───────────────────────────────────────────────────────────────────────

function changeMonth(delta) {
  curMonth += delta;
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  fetchEvents();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
fetchKolegovia().then(fetchEvents);
</script>

</html>
