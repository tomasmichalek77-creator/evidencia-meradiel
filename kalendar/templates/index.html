<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plánovač aktivít</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --border: #B0B8C4;
  --border-light: #D8DDE4;
  --bg: #F3F5F7;
  --white: #FFFFFF;
  --text: #1A202C;
  --muted: #6B7280;
  --today-bg: #EFF6FF;
  --today-num-bg: #2563EB;
  --red: #DC2626;
  --weekend-stripe: rgba(0,0,0,0.045);
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,.10);
  --week-col: 46px;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: #1E293B;
  color: #fff;
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
header h1 { font-size: 1rem; font-weight: 700; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 8px; }
.btn-new {
  background: #2563EB;
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 7px 16px;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.btn-new:hover { background: #1D4ED8; }

/* ── LAYOUT ── */
.wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 18px 14px;
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 16px;
}
@media(max-width: 850px) {
  .wrap { grid-template-columns: 1fr; }
  .sidebar { order: -1; }
}

/* ── CALENDAR CARD ── */
.cal-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid var(--border-light);
}

/* nav */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 2px solid var(--border);
  background: #F8FAFC;
}
.cal-nav h2 {
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--red);
  text-transform: uppercase;
}
.nav-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  background: var(--white);
  border-radius: 6px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: all .12s;
}
.nav-btn:hover { border-color: #2563EB; color: #2563EB; }

/* day-of-week header */
.cal-dow-header {
  display: grid;
  grid-template-columns: var(--week-col) repeat(7, 1fr);
  border-bottom: 2px solid var(--border);
  background: #F8FAFC;
}
.dow-spacer { border-right: 2px solid var(--border); }
.dow-label {
  text-align: center;
  font-size: .72rem;
  font-weight: 800;
  padding: 6px 2px;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  border-right: 1px solid var(--border-light);
}
.dow-label:last-child { border-right: none; }
.dow-label.weekend { color: var(--red); }

/* ── WEEK BLOCK ── */
.week-block {
  display: grid;
  grid-template-columns: var(--week-col) 1fr;
  border-bottom: 1px solid var(--border);
  min-height: 88px;
}
.week-block:last-child { border-bottom: none; }

.week-num-cell {
  border-right: 2px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 8px;
  font-size: .7rem;
  font-weight: 800;
  color: #94A3B8;
  letter-spacing: -.3px;
}

.week-main {
  display: flex;
  flex-direction: column;
}

/* spanning events area */
.spanning-area {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 3px 0 0;
  /* rows set dynamically */
}
.spanning-area:empty { display: none; }

.span-ev {
  margin: 1px 2px;
  border-radius: 3px;
  font-size: .71rem;
  font-weight: 700;
  color: #fff;
  padding: 2px 7px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  line-height: 1.5;
  align-self: center;
}
.span-ev:hover { opacity: .85; }
.span-ev.continues-left { border-radius: 0 3px 3px 0; padding-left: 10px; }
.span-ev.continues-right { border-radius: 3px 0 0 3px; padding-right: 10px; }
.span-ev.continues-both { border-radius: 0; }

/* day cells */
.days-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  flex: 1;
}

.day-cell {
  border-right: 1px solid var(--border-light);
  padding: 4px 4px 4px;
  cursor: pointer;
  position: relative;
  min-height: 60px;
  transition: background .1s;
}
.day-cell:last-child { border-right: none; }

.day-cell.weekend {
  background: repeating-linear-gradient(
    135deg,
    var(--weekend-stripe),
    var(--weekend-stripe) 4px,
    transparent 4px,
    transparent 11px
  );
  background-color: #FAFBFC;
}
.day-cell.other-month { opacity: .45; }
.day-cell.today-col { background: var(--today-bg) !important; }
.day-cell:hover:not(.weekend) { background: #F0F7FF; }
.day-cell.weekend:hover { background-color: #F0F0F0; }

.day-num-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin-bottom: 3px;
}
.day-num {
  font-size: .75rem;
  font-weight: 700;
  color: var(--muted);
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  line-height: 1;
}
.day-cell.weekend .day-num { color: var(--red); }
.day-cell.today-col .day-num {
  background: var(--today-num-bg);
  color: #fff;
}
.day-cell.other-month .day-num { color: #CBD5E0; }

/* today red line */
.day-cell.today-col::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--red);
}

/* single-day events */
.single-ev {
  display: block;
  font-size: .68rem;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  line-height: 1.5;
}
.single-ev:hover { opacity: .82; }
.more-label {
  font-size: .63rem;
  color: var(--muted);
  padding-left: 3px;
}

/* ── SIDEBAR ── */
.sidebar { display: flex; flex-direction: column; gap: 14px; }

.panel {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border-light);
  overflow: hidden;
}
.panel-hdr {
  padding: 10px 14px;
  font-size: .72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--muted);
  border-bottom: 1px solid var(--border-light);
  background: #F8FAFC;
}
.panel-body { padding: 10px 12px; }

.kolega-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 6px;
  border-radius: 6px;
}
.kolega-row:hover { background: var(--bg); }
.k-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.k-name { font-size: .86rem; font-weight: 500; flex: 1; }
.k-del {
  border: none; background: none; color: #CBD5E0;
  cursor: pointer; border-radius: 4px; font-size: .85rem;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
}
.k-del:hover { background: #FEE2E2; color: var(--red); }

.add-k-form {
  display: flex; gap: 6px; margin-top: 8px;
  padding-top: 8px; border-top: 1px solid var(--border-light);
}
.add-k-form input[type=text] {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 8px; font-size: .82rem; outline: none;
}
.add-k-form input[type=text]:focus { border-color: #2563EB; }
.add-k-form input[type=color] {
  width: 30px; height: 30px; border: 1px solid var(--border);
  border-radius: 6px; padding: 2px; cursor: pointer;
}
.btn-add {
  background: #2563EB; color: #fff; border: none;
  border-radius: 6px; padding: 6px 10px;
  font-size: .82rem; font-weight: 700; cursor: pointer;
}
.btn-add:hover { background: #1D4ED8; }

/* upcoming */
.upc-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 7px 0; border-bottom: 1px solid var(--border-light);
  cursor: pointer;
}
.upc-item:last-child { border-bottom: none; }
.upc-item:hover { opacity: .8; }
.upc-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }
.upc-date {
  min-width: 36px; text-align: center;
  background: #EFF6FF; border-radius: 6px; padding: 3px 2px;
}
.upc-d { font-size: .95rem; font-weight: 800; color: #2563EB; line-height: 1; }
.upc-m { font-size: .6rem; font-weight: 700; color: #2563EB; text-transform: uppercase; }
.upc-info { flex: 1; min-width: 0; }
.upc-title { font-size: .84rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upc-sub { font-size: .71rem; color: var(--muted); margin-top: 1px; }
.empty-msg { color: var(--muted); font-size: .84rem; text-align: center; padding: 10px 0; }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15,23,42,.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 14px;
  width: 100%; max-width: 460px;
  box-shadow: 0 24px 64px rgba(0,0,0,.22);
  animation: pop .18s ease;
}
@keyframes pop {
  from { transform: scale(.95) translateY(10px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.modal-hdr {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-hdr h3 { font-size: .95rem; font-weight: 800; }
.modal-x {
  width: 28px; height: 28px; border: none; background: var(--bg);
  border-radius: 6px; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; color: var(--muted);
}
.modal-body { padding: 18px; display: flex; flex-direction: column; gap: 13px; }
.modal-ftr {
  padding: 12px 18px; border-top: 1px solid var(--border-light);
  display: flex; gap: 8px; justify-content: flex-end;
}

.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.fg input, .fg select, .fg textarea {
  border: 1.5px solid var(--border);
  border-radius: 7px; padding: 8px 11px;
  font-size: .88rem; font-family: inherit;
  outline: none; color: var(--text);
  transition: border-color .12s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: #2563EB; }
.fg textarea { min-height: 60px; resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-prim {
  background: #2563EB; color: #fff; border: none;
  border-radius: 7px; padding: 8px 18px;
  font-size: .88rem; font-weight: 700; cursor: pointer;
}
.btn-prim:hover { background: #1D4ED8; }
.btn-sec {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 8px 14px; font-size: .88rem; font-weight: 600; cursor: pointer;
}
.btn-sec:hover { background: var(--border-light); }
.btn-del {
  background: #FEE2E2; color: var(--red); border: none;
  border-radius: 7px; padding: 8px 14px;
  font-size: .88rem; font-weight: 700; cursor: pointer;
  margin-right: auto;
}
.btn-del:hover { background: #FECACA; }
</style>
</head>
<body>

<header>
  <h1>Plánovač pracovných aktivít</h1>
  <div class="header-right">
    <button class="btn-new" onclick="openNew()">+ Nová udalosť</button>
  </div>
</header>

<div class="wrap">

  <!-- ── CALENDAR ── -->
  <div class="cal-card">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <h2 id="monthTitle"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="cal-dow-header">
      <div class="dow-spacer"></div>
      <div class="dow-label">Po</div>
      <div class="dow-label">Ut</div>
      <div class="dow-label">St</div>
      <div class="dow-label">Št</div>
      <div class="dow-label">Pi</div>
      <div class="dow-label weekend">So</div>
      <div class="dow-label weekend">Ne</div>
    </div>

    <div id="calBody"></div>
  </div>

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-hdr">Kolegovia</div>
      <div class="panel-body">
        <div id="kolegList"></div>
        <div class="add-k-form">
          <input type="text" id="newMeno" placeholder="Meno…">
          <input type="color" id="newFarba" value="#2563EB">
          <button class="btn-add" onclick="addKolega()">+</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hdr">Najbližšie udalosti</div>
      <div class="panel-body" id="upcomingList"></div>
    </div>
  </div>

</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="mTitle">Nová udalosť</h3>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Názov *</label>
        <input type="text" id="fNazov" placeholder="Napr. Porada, Dovolenka, Servis…">
      </div>
      <div class="row2">
        <div class="fg">
          <label>Dátum od *</label>
          <input type="date" id="fDatum">
        </div>
        <div class="fg">
          <label>Dátum do</label>
          <input type="date" id="fDatumDo" placeholder="(ak trvá viac dní)">
        </div>
      </div>
      <div class="row2">
        <div class="fg">
          <label>Čas od</label>
          <input type="time" id="fCasOd">
        </div>
        <div class="fg">
          <label>Čas do</label>
          <input type="time" id="fCasDo">
        </div>
      </div>
      <div class="fg">
        <label>Kolega</label>
        <select id="fKolega">
          <option value="">— nikto —</option>
        </select>
      </div>
      <div class="fg">
        <label>Poznámka</label>
        <textarea id="fPopis" placeholder="Voliteľný popis…"></textarea>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-del" id="btnDel" onclick="deleteEvent()" style="display:none">Vymazať</button>
      <button class="btn-sec" onclick="closeModal()">Zrušiť</button>
      <button class="btn-prim" onclick="saveEvent()">Uložiť</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];
const MONTHS3 = ['jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec'];

const today = new Date();
let curYear  = today.getFullYear();
let curMonth = today.getMonth();
let events   = [];
let kolegovia = [];
let editId   = null;

// ── helpers ───────────────────────────────────────────────────────────────────
function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return ds(today); }

function getISOWeek(d) {
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay() || 7));
  const y = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  return Math.ceil((((tmp - y) / 86400000) + 1) / 7);
}

function getWeeksOfMonth(year, month) {
  const first = new Date(year, month, 1);
  let dow = first.getDay(); // 0=Sun
  if (dow === 0) dow = 7;
  const monday = new Date(year, month, 2 - dow);
  const lastDay = new Date(year, month + 1, 0);
  const weeks = [];
  let ws = new Date(monday);
  while (ws <= lastDay) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws);
      d.setDate(ws.getDate() + i);
      week.push(d);
    }
    weeks.push(week);
    ws.setDate(ws.getDate() + 7);
  }
  return weeks;
}

function assignTracks(evList) {
  const sorted = [...evList].sort((a,b) => a.datum.localeCompare(b.datum));
  const trackEnds = [];
  const res = [];
  for (const ev of sorted) {
    const end = ev.datum_do || ev.datum;
    let t = trackEnds.findIndex(e => e < ev.datum);
    if (t === -1) { t = trackEnds.length; trackEnds.push(null); }
    trackEnds[t] = end;
    res.push({...ev, track: t});
  }
  return { items: res, numTracks: trackEnds.length };
}

// ── fetch ─────────────────────────────────────────────────────────────────────
async function fetchKolegovia() {
  const r = await fetch('/api/kolegovia');
  kolegovia = await r.json();
  renderKolegovia();
  rebuildKolegaSelect();
}

async function fetchEvents() {
  const r = await fetch(`/api/udalosti?rok=${curYear}&mesiac=${curMonth+1}`);
  events = await r.json();
  renderCal();
  renderUpcoming();
}

// ── render calendar ───────────────────────────────────────────────────────────
function renderCal() {
  document.getElementById('monthTitle').textContent = `${MONTHS[curMonth]} ${curYear}`;
  const body = document.getElementById('calBody');
  body.innerHTML = '';

  const weeks = getWeeksOfMonth(curYear, curMonth);
  const tStr  = todayStr();

  // index events by date for quick lookup
  const byDate = {};
  events.forEach(ev => {
    // single-day
    if (!ev.datum_do || ev.datum_do === ev.datum) {
      (byDate[ev.datum] = byDate[ev.datum] || []).push(ev);
    }
    // multi-day events are handled per-week below
  });

  const multiDay = events.filter(ev => ev.datum_do && ev.datum_do > ev.datum);

  weeks.forEach(week => {
    const wStart = ds(week[0]);
    const wEnd   = ds(week[6]);

    // find multi-day events overlapping this week
    const overlapping = multiDay.filter(ev => ev.datum <= wEnd && ev.datum_do >= wStart);
    const { items: tracked, numTracks } = assignTracks(overlapping);

    const block = document.createElement('div');
    block.className = 'week-block';

    // week number
    const wn = document.createElement('div');
    wn.className = 'week-num-cell';
    wn.textContent = getISOWeek(week[0]);
    block.appendChild(wn);

    // week main
    const main = document.createElement('div');
    main.className = 'week-main';

    // spanning area
    if (numTracks > 0) {
      const sa = document.createElement('div');
      sa.className = 'spanning-area';
      sa.style.gridTemplateRows = `repeat(${numTracks}, 20px)`;
      sa.style.height = (numTracks * 22 + 4) + 'px';

      tracked.forEach(ev => {
        const evStart = ev.datum > wStart ? ev.datum : wStart;
        const evEnd   = ev.datum_do < wEnd ? ev.datum_do : wEnd;

        const colStart = week.findIndex(d => ds(d) === evStart);
        const colEnd   = week.findIndex(d => ds(d) === evEnd);
        if (colStart === -1 || colEnd === -1) return;

        const chip = document.createElement('div');
        chip.className = 'span-ev';
        const cl = ev.datum < wStart, cr = ev.datum_do > wEnd;
        if (cl && cr) chip.classList.add('continues-both');
        else if (cl)  chip.classList.add('continues-left');
        else if (cr)  chip.classList.add('continues-right');

        chip.style.gridColumn = `${colStart+1} / ${colEnd+2}`;
        chip.style.gridRow    = ev.track + 1;
        chip.style.background = ev.kolega_farba || '#6B7280';
        chip.textContent = (cl ? '◂ ' : '') + ev.nazov + (cr ? ' ▸' : '');
        chip.onclick = e => { e.stopPropagation(); openEdit(ev); };
        sa.appendChild(chip);
      });

      main.appendChild(sa);
    }

    // days row
    const dr = document.createElement('div');
    dr.className = 'days-row';

    week.forEach((d, idx) => {
      const dStr = ds(d);
      const isOther   = d.getMonth() !== curMonth;
      const isWeekend = idx >= 5; // So=5, Ne=6
      const isToday   = dStr === tStr;

      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (isWeekend) cell.classList.add('weekend');
      if (isOther)   cell.classList.add('other-month');
      if (isToday)   cell.classList.add('today-col');

      const numWrap = document.createElement('div');
      numWrap.className = 'day-num-wrap';
      const num = document.createElement('span');
      num.className = 'day-num';
      // show "1 jan" on first of month
      if (d.getDate() === 1 && !isOther) {
        num.textContent = `1`;
        num.title = MONTHS[d.getMonth()];
      } else {
        num.textContent = d.getDate();
      }
      numWrap.appendChild(num);
      cell.appendChild(numWrap);

      // single-day events
      const dayEvs = (byDate[dStr] || []);
      const maxShow = 3;
      dayEvs.slice(0, maxShow).forEach(ev => {
        const chip = document.createElement('span');
        chip.className = 'single-ev';
        chip.style.background = ev.kolega_farba || '#6B7280';
        chip.textContent = (ev.cas_od ? ev.cas_od.slice(0,5)+' ' : '') + ev.nazov;
        chip.onclick = e => { e.stopPropagation(); openEdit(ev); };
        cell.appendChild(chip);
      });
      if (dayEvs.length > maxShow) {
        const m = document.createElement('span');
        m.className = 'more-label';
        m.textContent = `+${dayEvs.length - maxShow} ďalšie`;
        cell.appendChild(m);
      }

      cell.onclick = () => openNew(dStr);
      dr.appendChild(cell);
    });

    main.appendChild(dr);
    block.appendChild(main);
    body.appendChild(block);
  });
}

// ── sidebar ───────────────────────────────────────────────────────────────────
function renderKolegovia() {
  const list = document.getElementById('kolegList');
  list.innerHTML = '';
  kolegovia.forEach(k => {
    const row = document.createElement('div');
    row.className = 'kolega-row';
    row.innerHTML = `
      <span class="k-dot" style="background:${k.farba}"></span>
      <span class="k-name">${k.meno}</span>
      <button class="k-del" onclick="removeKolega(${k.id})">✕</button>`;
    list.appendChild(row);
  });
}

function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  list.innerHTML = '';
  const t = todayStr();
  const soon = events
    .filter(ev => (ev.datum_do || ev.datum) >= t)
    .sort((a,b) => a.datum.localeCompare(b.datum))
    .slice(0, 7);

  if (!soon.length) {
    list.innerHTML = '<p class="empty-msg">Žiadne nadchádzajúce udalosti</p>';
    return;
  }
  soon.forEach(ev => {
    const d = new Date(ev.datum + 'T12:00:00');
    const item = document.createElement('div');
    item.className = 'upc-item';
    const timeStr = ev.cas_od ? ev.cas_od.slice(0,5) + (ev.cas_do ? '–'+ev.cas_do.slice(0,5) : '') : '';
    const rangeStr = ev.datum_do ? `${d.getDate()}. ${MONTHS3[d.getMonth()]} – ${new Date(ev.datum_do+'T12:00:00').getDate()}. ${MONTHS3[new Date(ev.datum_do+'T12:00:00').getMonth()]}` : '';
    item.innerHTML = `
      <div class="upc-bar" style="background:${ev.kolega_farba||'#CBD5E0'}"></div>
      <div class="upc-date">
        <div class="upc-d">${d.getDate()}</div>
        <div class="upc-m">${MONTHS3[d.getMonth()]}</div>
      </div>
      <div class="upc-info">
        <div class="upc-title">${ev.nazov}</div>
        <div class="upc-sub">${rangeStr || timeStr || ''}${(rangeStr||timeStr) && ev.kolega_meno ? ' · ' : ''}${ev.kolega_meno||''}</div>
      </div>`;
    item.onclick = () => openEdit(ev);
    list.appendChild(item);
  });
}

function rebuildKolegaSelect() {
  const sel = document.getElementById('fKolega');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— nikto —</option>';
  kolegovia.forEach(k => {
    const o = document.createElement('option');
    o.value = k.id; o.textContent = k.meno;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

// ── modal ─────────────────────────────────────────────────────────────────────
function openNew(dateStr) {
  editId = null;
  document.getElementById('mTitle').textContent = 'Nová udalosť';
  document.getElementById('fNazov').value = '';
  document.getElementById('fDatum').value = dateStr || ds(today);
  document.getElementById('fDatumDo').value = '';
  document.getElementById('fCasOd').value = '';
  document.getElementById('fCasDo').value = '';
  document.getElementById('fKolega').value = '';
  document.getElementById('fPopis').value = '';
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fNazov').focus(), 60);
}

function openEdit(ev) {
  editId = ev.id;
  document.getElementById('mTitle').textContent = 'Upraviť udalosť';
  document.getElementById('fNazov').value = ev.nazov;
  document.getElementById('fDatum').value = ev.datum;
  document.getElementById('fDatumDo').value = ev.datum_do || '';
  document.getElementById('fCasOd').value = ev.cas_od || '';
  document.getElementById('fCasDo').value = ev.cas_do || '';
  document.getElementById('fKolega').value = ev.kolega_id || '';
  document.getElementById('fPopis').value = ev.popis || '';
  document.getElementById('btnDel').style.display = 'block';
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveEvent() {
  const nazov = document.getElementById('fNazov').value.trim();
  const datum  = document.getElementById('fDatum').value;
  if (!nazov || !datum) { alert('Vyplňte aspoň názov a dátum.'); return; }
  const payload = {
    nazov, datum,
    datum_do: document.getElementById('fDatumDo').value || null,
    cas_od:   document.getElementById('fCasOd').value || null,
    cas_do:   document.getElementById('fCasDo').value || null,
    kolega_id: document.getElementById('fKolega').value ? +document.getElementById('fKolega').value : null,
    popis:    document.getElementById('fPopis').value.trim() || null,
  };
  const url = editId ? `/api/udalosti/${editId}` : '/api/udalosti';
  const method = editId ? 'PUT' : 'POST';
  await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  closeModal();
  fetchEvents();
}

async function deleteEvent() {
  if (!editId || !confirm('Vymazať túto udalosť?')) return;
  await fetch(`/api/udalosti/${editId}`, { method:'DELETE' });
  closeModal();
  fetchEvents();
}

// ── kolegovia ─────────────────────────────────────────────────────────────────
async function addKolega() {
  const meno = document.getElementById('newMeno').value.trim();
  if (!meno) return;
  const farba = document.getElementById('newFarba').value;
  await fetch('/api/kolegovia', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({meno, farba}) });
  document.getElementById('newMeno').value = '';
  await fetchKolegovia();
  fetchEvents();
}

async function removeKolega(id) {
  if (!confirm('Odstrániť kolegu?')) return;
  await fetch(`/api/kolegovia/${id}`, { method:'DELETE' });
  await fetchKolegovia();
  fetchEvents();
}

// ── nav ───────────────────────────────────────────────────────────────────────
function changeMonth(d) {
  curMonth += d;
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  fetchEvents();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── init ──────────────────────────────────────────────────────────────────────
fetchKolegovia().then(fetchEvents);
</script>
</body>
</html>
