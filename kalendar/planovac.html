<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plánovač aktivít</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --border:#B0B8C4; --border-light:#D8DDE4;
  --bg:#F0F2F5; --white:#FFFFFF;
  --text:#1A202C; --muted:#6B7280;
  --red:#DC2626; --blue:#2563EB;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,.10);
  --week-col:38px; --hdr:50px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* HEADER */
header{background:#1E293B;color:#fff;padding:0 12px;height:var(--hdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:6px;z-index:10;}
header h1{font-size:.85rem;font-weight:700;white-space:nowrap;}
.hdr-right{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.btn-new{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-new:hover{background:#1D4ED8;}
.btn-hdr{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:7px;padding:6px 9px;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.btn-hdr:hover{background:rgba(255,255,255,.25);}

/* LAYOUT */
.main{flex:1;display:flex;overflow:hidden;min-height:0;}

/* SIDEBAR */
.sidebar{width:215px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border-light);display:flex;flex-direction:column;overflow-y:auto;transition:width .2s;}
.sidebar.hidden{width:0;overflow:hidden;}
.phdr{padding:7px 12px;font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:1px solid var(--border-light);background:#F8FAFC;flex-shrink:0;}
.pbody{padding:7px 9px;}

/* legend */
.leg-hint{font-size:.6rem;color:#94A3B8;padding:2px 6px 4px;}
.leg-item{display:flex;align-items:center;gap:6px;padding:4px 6px;font-size:.77rem;border-radius:6px;cursor:grab;user-select:none;transition:background .1s,transform .1s;}
.leg-item:hover{background:#EFF6FF;}
.leg-item:active{cursor:grabbing;transform:scale(.97);}
.leg-item.dragging{opacity:.5;}
.leg-icon{font-size:.9rem;width:20px;text-align:center;}
.leg-label{flex:1;}
.leg-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}

/* kolegovia / db rows */
.db-row{display:flex;align-items:center;gap:5px;padding:3px 3px;border-radius:5px;}
.db-row:hover{background:var(--bg);}
.db-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.db-name{font-size:.78rem;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.db-sub{font-size:.68rem;color:var(--muted);}
.db-del{border:none;background:none;color:#CBD5E0;cursor:pointer;border-radius:3px;font-size:.7rem;width:15px;height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.db-del:hover{background:#FEE2E2;color:var(--red);}

.add-form{display:flex;gap:3px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border-light);flex-wrap:wrap;}
.add-form input{flex:1;min-width:60px;border:1px solid var(--border);border-radius:5px;padding:4px 6px;font-size:.75rem;outline:none;}
.add-form input:focus{border-color:var(--blue);}
.add-form input[type=color]{width:22px;height:22px;padding:1px;flex:none;border-radius:4px;}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:4px 7px;font-size:.75rem;font-weight:700;cursor:pointer;flex-shrink:0;}

/* CALENDAR AREA */
.cal-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;padding:9px;}
.cal-card{flex:1;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-light);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-bottom:2px solid var(--border);background:#F8FAFC;flex-shrink:0;}
.cal-nav h2{font-size:.96rem;font-weight:800;color:var(--red);text-transform:uppercase;}
.nav-btn{width:27px;height:27px;border:1px solid var(--border);background:var(--white);border-radius:5px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.cal-dow{display:grid;grid-template-columns:var(--week-col) repeat(7,1fr);border-bottom:2px solid var(--border);background:#F8FAFC;flex-shrink:0;}
.dow-sp{border-right:2px solid var(--border);}
.dow-lbl{text-align:center;font-size:.63rem;font-weight:800;padding:5px 2px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border-light);}
.dow-lbl:last-child{border-right:none;}
.dow-lbl.we{color:var(--red);}
#calBody{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.week-block{flex:1;display:grid;grid-template-columns:var(--week-col) 1fr;border-bottom:1px solid var(--border);min-height:0;}
.week-block:last-child{border-bottom:none;}
.wnum{border-right:2px solid var(--border);display:flex;align-items:flex-start;justify-content:center;padding-top:5px;font-size:.6rem;font-weight:800;color:#94A3B8;}
.wmain{display:flex;flex-direction:column;min-height:0;}
.span-area{display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0;padding:2px 0 0;}
.span-area:empty{display:none;}
.span-ev{margin:1px 2px;border-radius:3px;font-size:.68rem;font-weight:700;color:#fff;padding:1px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.5;align-self:center;height:18px;}
.span-ev:hover{opacity:.82;}
.cl{border-radius:0 3px 3px 0;} .cr{border-radius:3px 0 0 3px;} .cb{border-radius:0;}
.days-row{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0;}
.day-cell{border-right:1px solid var(--border-light);padding:2px 3px;cursor:pointer;overflow:hidden;transition:background .1s;position:relative;display:flex;flex-direction:column;}
.day-cell:last-child{border-right:none;}
.day-cell.we{background:repeating-linear-gradient(135deg,rgba(0,0,0,.035),rgba(0,0,0,.035) 3px,transparent 3px,transparent 10px);background-color:#FAFBFC;}
.day-cell.om{opacity:.35;pointer-events:none;}
.day-cell.tod{background:#EFF6FF !important;}
.day-cell:not(.om):not(.we):hover{background:#F0F7FF;}
.day-cell.tod::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--red);}
.day-cell.drag-over{background:#DBEAFE !important;outline:2px dashed var(--blue);outline-offset:-2px;}
.dnum-wrap{display:flex;justify-content:flex-end;margin-bottom:1px;flex-shrink:0;}
.dnum{font-size:.67rem;font-weight:700;color:var(--muted);width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;}
.we .dnum{color:var(--red);}
.tod .dnum{background:var(--blue);color:#fff;}
.s-ev{display:flex;align-items:center;gap:2px;font-size:.66rem;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:2px;color:#fff;cursor:pointer;overflow:hidden;flex-shrink:0;min-height:16px;}
.s-ev:hover{opacity:.82;}
.s-ev .ev-icon{font-size:.72rem;flex-shrink:0;line-height:1;}
.s-ev .ev-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.more-lbl{font-size:.57rem;color:var(--muted);padding-left:2px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:200;align-items:center;justify-content:center;padding:12px;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:520px;max-height:93vh;box-shadow:0 24px 64px rgba(0,0,0,.22);display:flex;flex-direction:column;animation:pop .17s ease;}
.modal.wide{max-width:680px;}
@keyframes pop{from{transform:scale(.95) translateY(8px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.mhdr{padding:12px 15px 9px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mhdr h3{font-size:.88rem;font-weight:800;}
.mx{width:25px;height:25px;border:none;background:var(--bg);border-radius:6px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.mbody{padding:13px 15px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.mftr{padding:9px 15px;border-top:1px solid var(--border-light);display:flex;gap:6px;justify-content:flex-end;flex-shrink:0;}

.fg{display:flex;flex-direction:column;gap:3px;}
.fg label{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:.84rem;font-family:inherit;outline:none;color:var(--text);width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);}
.fg textarea{min-height:46px;resize:vertical;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* type grid 4 cols */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.type-btn{border:2px solid var(--border-light);border-radius:8px;padding:6px 3px;cursor:pointer;background:var(--white);text-align:center;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.type-btn:hover{border-color:var(--blue);background:#EFF6FF;}
.type-btn.sel{border-color:var(--blue);background:#EFF6FF;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.type-btn .ti{font-size:1.2rem;line-height:1;}
.type-btn .tl{font-size:.57rem;font-weight:600;color:var(--muted);line-height:1.2;}
.type-btn.sel .tl{color:var(--blue);}

/* conditional fields */
.cond-block{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:9px;display:flex;flex-direction:column;gap:8px;}
.cond-block.blue{background:#EFF6FF;border-color:#BFDBFE;}
.cond-title{font-size:.67rem;font-weight:800;color:#92400E;text-transform:uppercase;letter-spacing:.4px;}
.cond-block.blue .cond-title{color:#1E40AF;}

/* person chips */
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.person-chip{border:2px solid var(--border-light);border-radius:20px;padding:4px 11px;cursor:pointer;background:var(--white);font-size:.8rem;font-weight:600;color:var(--muted);transition:all .12s;white-space:nowrap;}
.person-chip:hover{border-color:var(--blue);}
.person-chip.sel{color:#fff;border-color:transparent;}

/* search autocomplete */
.search-wrap{position:relative;}
.search-selected{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.sel-tag{display:inline-flex;align-items:center;gap:4px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;padding:2px 7px;font-size:.78rem;font-weight:600;color:var(--blue);}
.sel-tag button{border:none;background:none;cursor:pointer;color:#93C5FD;font-size:.8rem;line-height:1;padding:0;}
.sel-tag button:hover{color:var(--red);}
.search-input{border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:.84rem;width:100%;outline:none;}
.search-input:focus{border-color:var(--blue);}
.search-drop{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--white);border:1.5px solid var(--blue);border-radius:8px;max-height:160px;overflow-y:auto;z-index:300;box-shadow:var(--shadow);}
.search-drop.show{display:block;}
.search-opt{padding:7px 11px;cursor:pointer;font-size:.83rem;}
.search-opt:hover{background:#EFF6FF;}
.search-opt.add-new{color:var(--blue);font-weight:700;border-top:1px solid var(--border-light);}
.search-empty{padding:7px 11px;color:var(--muted);font-size:.8rem;}

/* buttons */
.bp{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:7px 15px;font-size:.84rem;font-weight:700;cursor:pointer;}
.bp:hover{background:#1D4ED8;}
.bs{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:.84rem;font-weight:600;cursor:pointer;}
.bd{background:#FEE2E2;color:var(--red);border:none;border-radius:7px;padding:7px 11px;font-size:.84rem;font-weight:700;cursor:pointer;margin-right:auto;}

/* auto table */
.auto-table{width:100%;border-collapse:collapse;font-size:.81rem;}
.auto-table th{background:#F8FAFC;padding:7px 9px;text-align:left;font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:2px solid var(--border);}
.auto-table td{padding:7px 9px;border-bottom:1px solid var(--border-light);vertical-align:top;}
.auto-table tr:last-child td{border-bottom:none;}
.auto-table tr:hover td{background:#F8FAFC;}
.spz-badge{background:#1E293B;color:#fff;font-size:.7rem;font-weight:700;padding:2px 6px;border-radius:4px;font-family:monospace;letter-spacing:1px;}
.no-data{color:var(--muted);text-align:center;padding:18px;font-size:.86rem;}

/* mgmt modal */
.mgmt-item{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:5px;}
.mgmt-item:hover{background:var(--bg);}
.mgmt-name{font-size:.83rem;flex:1;}
.mgmt-sub{font-size:.71rem;color:var(--muted);}

/* Day Detail */
.day-detail-cards{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;}
.ev-card{background:var(--white);border:1px solid var(--border-light);border-radius:10px;overflow:hidden;min-width:200px;max-width:320px;flex:1;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.ev-card-hdr{display:flex;align-items:center;gap:7px;padding:9px 11px;color:#fff;}
.ev-card-icon{font-size:1.15rem;line-height:1;flex-shrink:0;}
.ev-card-type{font-size:.79rem;font-weight:700;flex:1;line-height:1.2;}
.ev-card-edit{border:none;background:rgba(255,255,255,.25);border-radius:6px;cursor:pointer;font-size:.74rem;padding:3px 7px;color:#fff;flex-shrink:0;white-space:nowrap;}
.ev-card-edit:hover{background:rgba(255,255,255,.45);}
.ev-card-body{padding:10px 11px;display:flex;flex-direction:column;gap:5px;}
.ev-card-nazov{font-size:.93rem;font-weight:700;color:var(--text);line-height:1.3;}
.ev-card-detail{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.4;}
.ev-card-persons{gap:4px;}
.ev-card-person{display:inline-block;color:#fff;border-radius:12px;padding:2px 9px;font-size:.75rem;font-weight:700;}
.ev-card-popis{font-size:.78rem;color:#64748B;border-top:1px solid var(--border-light);padding-top:6px;margin-top:3px;font-style:italic;line-height:1.4;}
/* worker draggable hint */
.kol-drag-hint{font-size:.6rem;color:#94A3B8;padding:2px 6px 4px;}

/* REPORT */
.rep-tabs{display:flex;gap:2px;padding:8px 13px 0;border-bottom:1px solid var(--border-light);background:#F8FAFC;flex-shrink:0;}
.rep-tab{padding:7px 16px;font-size:.82rem;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:6px 6px 0 0;}
.rep-tab:hover{color:var(--text);}
.rep-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--white);}
.rep-ctrl{display:flex;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border-light);background:#FAFBFC;flex-shrink:0;flex-wrap:wrap;}
.rep-ctrl label{font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
.rep-ctrl input[type=month]{border:1.5px solid var(--border);border-radius:6px;padding:4px 9px;font-size:.82rem;outline:none;font-family:inherit;}
.rep-ctrl input[type=month]:focus{border-color:var(--blue);}
.rep-wlabel{font-size:.86rem;font-weight:700;color:var(--text);}
/* person section */
.rep-person{margin-bottom:18px;}
.rep-person-hdr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:2px solid var(--border);margin-bottom:5px;}
.rep-person-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rep-person-name{font-size:.92rem;font-weight:800;color:var(--text);}
.rep-person-count{font-size:.74rem;color:var(--muted);margin-left:auto;}
.rep-ev-row{display:grid;grid-template-columns:105px 26px 1fr;gap:5px;align-items:start;padding:4px 6px;border-radius:5px;cursor:pointer;font-size:.8rem;}
.rep-ev-row:hover{background:#EFF6FF;}
.rep-ev-date{color:var(--muted);font-weight:600;font-size:.77rem;padding-top:2px;}
.rep-ev-icon{text-align:center;padding-top:1px;}
.rep-ev-main{display:flex;flex-direction:column;gap:2px;}
.rep-ev-title{font-weight:600;color:var(--text);line-height:1.3;}
.rep-ev-sub{font-size:.73rem;color:var(--muted);line-height:1.4;}
/* week section */
.rep-day-block{margin-bottom:12px;}
.rep-day-hdr{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1E293B;padding:5px 9px;background:#F1F5F9;border-radius:6px;margin-bottom:5px;}
.rep-day-hdr.we{color:var(--red);background:#FEF2F2;}
.rep-day-hdr.tod{color:var(--blue);background:#EFF6FF;}
.rep-week-ev{display:grid;grid-template-columns:26px 1fr 110px 68px;gap:5px;align-items:center;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:.8rem;}
.rep-week-ev:hover{background:#EFF6FF;}
.rep-persons-mini{display:flex;gap:3px;flex-wrap:wrap;}
.rep-person-mini{color:#fff;border-radius:10px;padding:2px 8px;font-size:.7rem;font-weight:700;}
.rep-time-cell{font-size:.73rem;color:var(--muted);text-align:right;}
.rep-empty-day{font-size:.75rem;color:#CBD5E0;padding:2px 9px;}
.rep-no-data{color:var(--muted);text-align:center;padding:28px;font-size:.86rem;}
.btn-print{background:#16A34A;color:#fff;border:none;border-radius:7px;padding:6px 13px;font-size:.78rem;font-weight:700;cursor:pointer;}
.btn-print:hover{background:#15803D;}

/* Filter active */
#kList.has-filter .db-row{opacity:.32;}
#kList.has-filter .db-row.fil-sel{opacity:1;background:#EFF6FF;}
.fil-clear{font-size:.67rem;color:var(--blue);cursor:pointer;padding:2px 6px;text-decoration:underline;}
/* Year view */
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.mini-cal{border:1px solid var(--border-light);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .1s,border-color .1s;}
.mini-cal:hover{border-color:var(--blue);box-shadow:var(--shadow);}
.mini-cal.cur-m{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.18);}
.mini-cal-hdr{background:#F8FAFC;padding:5px 7px;font-size:.68rem;font-weight:800;text-transform:uppercase;color:var(--muted);text-align:center;letter-spacing:.4px;}
.mini-cal.cur-m .mini-cal-hdr{color:var(--blue);}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:3px 4px 5px;gap:1px;}
.mini-d{width:100%;aspect-ratio:1;border-radius:3px;font-size:.54rem;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:600;line-height:1;}
.mini-d.has-ev{background:var(--blue);color:#fff;}
.mini-d.is-tod{background:var(--red);color:#fff;border-radius:50%;}
.mini-d.we{color:var(--red);}
.mini-d.om{opacity:.2;}
/* Statistics */
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.stat-name{width:80px;font-size:.78rem;font-weight:600;text-align:right;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stat-bar-bg{flex:1;background:#F1F5F9;border-radius:4px;height:18px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:.7rem;font-weight:700;color:#fff;min-width:18px;}
.stat-val{width:30px;font-size:.82rem;font-weight:800;text-align:right;}
.stat-section-hdr{font-size:.73rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border-light);}
/* Kiosk / presentation */
body.kiosk .sidebar{display:none !important;}
body.kiosk .kiosk-hide{display:none !important;}
body.kiosk .kiosk-show{display:flex !important;}
body.kiosk header{background:#0F172A;height:auto;padding:5px 14px;}
body.kiosk header h1{font-size:.95rem;}
body.kiosk .cal-area{padding:5px;}
body.kiosk .s-ev{font-size:.76rem;min-height:20px;}
body.kiosk .span-ev{font-size:.77rem;height:20px;}
body.kiosk .day-cell{cursor:default !important;}
body.kiosk .day-cell:not(.om):not(.we):hover{background:inherit;}
.kiosk-bar{display:none;align-items:center;gap:14px;flex:1;justify-content:center;}
.kiosk-time{font-size:1.18rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
.kiosk-date-txt{font-size:.82rem;color:#94A3B8;}

@media(max-width:700px){
  html,body{overflow:auto;}
  .main{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border-light);max-height:220px;}
  .sidebar.hidden{max-height:0;height:0;}
  .cal-area{padding:7px;}
  #calBody{overflow-y:auto;}
  .week-block{min-height:80px;}
  .type-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<header>
  <h1>📋 Plánovač aktivít</h1>
  <div class="kiosk-bar" id="kioskBar">
    <span class="kiosk-time" id="kioskTime">00:00:00</span>
    <span class="kiosk-date-txt" id="kioskDateTxt"></span>

    <button class="btn-hdr kiosk-hide" onclick="openYearView()">📅 Rok</button>
    <button class="btn-hdr kiosk-hide" onclick="exportData()" title="Stiahnuť zálohu dát (JSON)">⬇️ Záloha</button>

    <button class="btn-hdr kiosk-hide" onclick="enterKiosk()" title="Prezentačný režim – informačná tabuľa na TV">📺 Tabula</button>

    <button class="btn-new kiosk-hide" onclick="openNew()">+ Nová udalosť</button>

  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="phdr">Typy udalostí</div>
    <div class="pbody" id="legendList"></div>

    <div class="phdr">Pracovníci</div>
    <div class="pbody">
      <div id="kList"></div>
      <div class="add-form">

    </div>

    <div class="phdr">Zákazníci</div>
    <div class="pbody">
      <div id="zList"></div>
      <div class="add-form">

        <input type="text" id="newZIco" placeholder="IČO" style="max-width:80px">

    <div class="phdr">Meradlá</div>

  <div class="cal-area">

        <div class="dow-lbl">Pondelok</div><div class="dow-lbl">Utorok</div>
        <div class="dow-lbl">Streda</div><div class="dow-lbl">Štvrtok</div>
        <div class="dow-lbl">Piatok</div>

</div>

<!-- EVENT MODAL -->
<div class="overlay" id="ov" onclick="ovBg(event)">
  <div class="modal">
    <div class="mhdr">
      <h3 id="mT">Nová udalosť</h3>
      <button class="mx" onclick="closeM()">✕</button>
    </div>
    <div class="mbody">

      <div class="fg">
        <label>Typ udalosti</label>
        <div class="type-grid" id="typeGrid"></div>
      </div>

      <!-- Auto fields -->
      <div class="cond-block" id="autoFields" style="display:none">
        <div class="cond-title">🚗 Údaje o vozidle</div>
        <div class="row2">
          <div class="fg"><label>Značka / model</label><input type="text" id="fAutoZn" placeholder="napr. Škoda Octavia"></div>
          <div class="fg"><label>ŠPZ</label><input type="text" id="fAutoSpz" placeholder="napr. BA-123EF" style="text-transform:uppercase"></div>

      <!-- Dohľad sub-typ -->

      <div class="row2">

        <div class="fg"><label>Miesto / hala</label><input type="text" id="fMiesto" placeholder="napr. malá hala"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Dátum od *</label><input type="date" id="fD"></div>
        <div class="fg"><label>Dátum do</label><input type="date" id="fDD"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Čas od</label><input type="time" id="fCO"></div>
        <div class="fg"><label>Čas do</label><input type="time" id="fCD"></div>

        <label>Pracovník(ci)</label>

        <div class="fg"><label>Opakovanie</label>
          <select id="fRec" onchange="document.getElementById('recCountWrap').style.display=this.value!=='none'?'flex':'none'">
            <option value="none">— jednorazové —</option>
            <option value="weekly">Každý týždeň</option>
            <option value="biweekly">Každé 2 týždne</option>
            <option value="monthly">Každý mesiac</option>

        </div>
        <div class="fg" id="recCountWrap" style="display:none"><label>Počet opakovaní</label><input type="number" id="fRecCount" value="4" min="2" max="52"></div>
      </div>
      <div class="fg"><label>Poznámka</label><textarea id="fP" placeholder="Voliteľný popis…"></textarea></div>
    </div>
    <div class="mftr">
      <button class="bd" id="btnDel" onclick="delEv()" style="display:none">Vymazať</button>
      <button class="bs" id="btnDup" onclick="dupEv()" style="display:none" title="Kópia na iný dátum">📋 Duplikovať</button>
      <button class="bs" onclick="closeM()">Zrušiť</button>
      <button class="bp" onclick="saveEv()">Uložiť</button>
    </div>
  </div>
</div>

<!-- YEAR VIEW -->

    <div class="mhdr"><h3>🚗 Prehľad objednaných vozidiel</h3><button class="mx" onclick="document.getElementById('ovAuto').classList.remove('open')">✕</button></div>
    <div class="mbody" style="padding:0"><div id="autoTableWrap"></div></div>
  </div>
</div>

<script>
// ── TYPY ─────────────────────────────────────────────────────────────────────
const TYPY=[
  {id:'auto',          label:'Služobné\nauto',       ikona:'🚗', farba:'#7C3AED'},
  {id:'kal_over',      label:'Kalibrácia/\nOverenie',ikona:'🔬', farba:'#0891B2'},
  {id:'meranie_u_zak', label:'Meranie u\nzákazníka', ikona:'📍', farba:'#0369A1'},
  {id:'prijem_vydaj',  label:'Príjem /\nVýdaj',      ikona:'📦', farba:'#475569'},
  {id:'int_audit',     label:'Interný\naudit',        ikona:'📊', farba:'#6D28D9'},
  {id:'ext_audit',     label:'Externý\naudit',        ikona:'🔍', farba:'#B45309'},
  {id:'dohlad',        label:'Dohľad',                ikona:'👁️',  farba:'#6366F1'},
  {id:'skolenie',      label:'Školenie',              ikona:'📚', farba:'#D97706'},
  {id:'porada',        label:'Porada',                ikona:'🤝', farba:'#2563EB'},
  {id:'servis',        label:'Servis /\nOprava',      ikona:'🔧', farba:'#92400E'},
  {id:'dovolenka',     label:'Dovolenka',             ikona:'🌴', farba:'#16A34A'},
  {id:'lekar',         label:'Lekár',                 ikona:'🏥', farba:'#EC4899'},
  {id:'lekar_spr',     label:'Lekár –\nsprievod',    ikona:'👨‍⚕️', farba:'#DB2777'},
  {id:'ine',           label:'Iné',                   ikona:'📋', farba:'#6B7280'},
];
function getTyp(id){return TYPY.find(t=>t.id===id)||TYPY[TYPY.length-1];}

// types where meradla field is shown
const TYPY_MERADLA=['kal_over','meranie_u_zak'];
// types where zakaznik is always relevant
const TYPY_ZAKAZNIK=['kal_over','meranie_u_zak','int_audit','ext_audit','dohlad','servis'];

// ── STORAGE ───────────────────────────────────────────────────────────────────
const K_EV='pla_ev',K_KL='pla_kl',K_ZA='pla_za',K_ME='pla_me';
function load(k,def){try{return JSON.parse(localStorage.getItem(k)||'null')||def;}catch(e){return def;}}
function save(k,d){localStorage.setItem(k,JSON.stringify(d));}

function defaultK(){return[
  {id:1,meno:'Michálek',farba:'#2563EB'},{id:2,meno:'Kolaja',farba:'#DC2626'},
  {id:3,meno:'Pokorný',farba:'#16A34A'},{id:4,meno:'Hatala',farba:'#D97706'},
];}
function nextId(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1;}

// ── STATE ─────────────────────────────────────────────────────────────────────
const today=new Date();
let curY=today.getFullYear(),curM=today.getMonth();
let events=load(K_EV,[]),kolegovia=load(K_KL,null)||defaultK();
let zakaznici=load(K_ZA,[]),meradla=load(K_ME,[]);
let editId=null,selTyp=null,selPersonIds=[],selZakaznikId=null,selMeradlaIds=[],dragTypId=null,dragKolegaId=null,currentDetailDate=null;
let filterKolegaId=null,kioskInterval=null,yearViewYear=today.getFullYear();

// migrate old format
events=events.map(ev=>{
  if(ev.kolegaId!==undefined&&!ev.kolegaIds) return{...ev,kolegaIds:ev.kolegaId?[ev.kolegaId]:[],kolegaId:undefined};
  if(!ev.kolegaIds) ev.kolegaIds=[];
  if(!ev.meradlaIds) ev.meradlaIds=[];
  return ev;
});

const MONTHS=['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function tds(){return ds(today);}
function fmtD(s){if(!s)return'';const d=new Date(s+'T12:00:00');return`${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;}
function kById(id){return kolegovia.find(k=>k.id==id);}
function zById(id){return zakaznici.find(z=>z.id==id);}
function mById(id){return meradla.find(m=>m.id==id);}

function evPersonNames(ev){return(ev.kolegaIds||[]).map(id=>{const k=kById(id);return k?k.meno:'?';}).join(', ');}
function chipColor(ev){
  const ids=ev.kolegaIds||[];
  if(ids.length===1){const k=kById(ids[0]);if(k)return k.farba;}
  return getTyp(ev.typ).farba;
}
function evLabel(ev){
  const typ=getTyp(ev.typ);
  let parts=[ev.nazov||typ.label.replace('\n',' ')];
  if(ev.typ==='dohlad'&&ev.dohladTyp) parts=[ev.dohladTyp,...parts];
  if(ev.zakaznikId){const z=zById(ev.zakaznikId);if(z)parts.push(z.nazov);}
  return parts.filter(Boolean).join(' · ');
}

function getISOWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  const y=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil((((t-y)/86400000)+1)/7);
}
function getWeeks(year,month){
  const first=new Date(year,month,1);
  let dow=first.getDay();if(dow===0)dow=7;
  const mon=new Date(year,month,2-dow),last=new Date(year,month+1,0);
  const weeks=[];let ws=new Date(mon);
  while(ws<=last){
    const w=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);w.push(d);}weeks.push(w);
    ws.setDate(ws.getDate()+7);
  }
  return weeks;
}
function assignTracks(evs){
  const sorted=[...evs].sort((a,b)=>a.datum.localeCompare(b.datum));
  const tEnds=[],res=[];
  for(const ev of sorted){
    const end=ev.datumDo||ev.datum;
    let t=tEnds.findIndex(e=>e<ev.datum);
    if(t===-1){t=tEnds.length;tEnds.push(null);}
    tEnds[t]=end;res.push({...ev,track:t});
  }
  return{items:res,num:tEnds.length};
}

// ── RENDER CALENDAR ───────────────────────────────────────────────────────────
function render(){
  document.getElementById('mTitle').textContent=`${MONTHS[curM]} ${curY}`;
  const body=document.getElementById('calBody');body.innerHTML='';
  const weeks=getWeeks(curY,curM);
  const ts=tds();
  const firstDay=`${curY}-${String(curM+1).padStart(2,'0')}-01`;
  const lastDay=ds(new Date(curY,curM+1,0));
  const byDate={};const multiDay=[];
  const visEvs=filterKolegaId?events.filter(ev=>(ev.kolegaIds||[]).includes(filterKolegaId)):events;
  visEvs.forEach(ev=>{
    if(!ev.datumDo||ev.datumDo===ev.datum)(byDate[ev.datum]=byDate[ev.datum]||[]).push(ev);
    else multiDay.push(ev);
  });
  weeks.forEach(week=>{
    const wS=ds(week[0]),wE=ds(week[6]);
    const overlap=multiDay.filter(ev=>ev.datum<=wE&&(ev.datumDo||ev.datum)>=wS&&ev.datum<=lastDay&&(ev.datumDo||ev.datum)>=firstDay);
    const{items:tracked,num:numT}=assignTracks(overlap);
    const blk=document.createElement('div');blk.className='week-block';
    const wn=document.createElement('div');wn.className='wnum';wn.textContent=getISOWeek(week[0]);blk.appendChild(wn);
    const wm=document.createElement('div');wm.className='wmain';
    if(numT>0){
      const sa=document.createElement('div');sa.className='span-area';
      sa.style.gridTemplateRows=`repeat(${numT},18px)`;sa.style.height=(numT*20+4)+'px';
      tracked.forEach(ev=>{
        const evS=ev.datum>wS?ev.datum:wS,evE=(ev.datumDo||ev.datum)<wE?(ev.datumDo||ev.datum):wE;
        const cS=week.findIndex(d=>ds(d)===evS),cE=week.findIndex(d=>ds(d)===evE);
        if(cS===-1||cE===-1)return;
        const chip=document.createElement('div');chip.className='span-ev';
        const cl=ev.datum<wS,cr=(ev.datumDo||ev.datum)>wE;
        if(cl&&cr)chip.classList.add('cb');else if(cl)chip.classList.add('cl');else if(cr)chip.classList.add('cr');
        chip.style.gridColumn=`${cS+1}/${cE+2}`;chip.style.gridRow=ev.track+1;
        chip.style.background=chipColor(ev);
        const typ=getTyp(ev.typ);
        chip.textContent=(cl?'◂ ':'')+typ.ikona+' '+evLabel(ev)+(cr?' ▸':'');
        chip.onclick=e=>{e.stopPropagation();openEdit(ev.id);};
        sa.appendChild(chip);
      });
      wm.appendChild(sa);
    }
    const dr=document.createElement('div');dr.className='days-row';
    week.forEach((d,idx)=>{
      const dStr=ds(d),isOM=d.getMonth()!==curM,isWE=idx>=5,isT=dStr===ts;
      const cell=document.createElement('div');
      cell.className='day-cell'+(isWE?' we':'')+(isOM?' om':'')+(isT?' tod':'');
      const nw=document.createElement('div');nw.className='dnum-wrap';
      const num=document.createElement('span');num.className='dnum';num.textContent=d.getDate();
      nw.appendChild(num);cell.appendChild(nw);
      if(!isOM){
        (byDate[dStr]||[]).slice(0,4).forEach(ev=>{
          const chip=document.createElement('div');chip.className='s-ev';
          chip.style.background=chipColor(ev);
          const typ=getTyp(ev.typ);
          const ico=document.createElement('span');ico.className='ev-icon';ico.textContent=typ.ikona;
          const txt=document.createElement('span');txt.className='ev-txt';
          txt.textContent=(ev.casOd?ev.casOd.slice(0,5)+' ':'')+evLabel(ev);
          chip.appendChild(ico);chip.appendChild(txt);
          chip.onclick=e=>{e.stopPropagation();openEdit(ev.id);};
          cell.appendChild(chip);
        });
        const rest=(byDate[dStr]||[]).length-4;
        if(rest>0){const m=document.createElement('span');m.className='more-lbl';m.textContent=`+${rest}`;cell.appendChild(m);}
      }
      cell.onclick=()=>openDayDetail(dStr);
      cell.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';cell.classList.add('drag-over');};
      cell.ondragleave=()=>cell.classList.remove('drag-over');
      cell.ondrop=e=>{e.preventDefault();cell.classList.remove('drag-over');const raw=e.dataTransfer.getData('text/plain')||'';if(raw.startsWith('kolega:')){openNewPrefilledKolega(parseInt(raw.split(':')[1]),dStr);}else{const tid=raw||dragTypId;if(tid)openNewWithTyp(tid,dStr);}};
      dr.appendChild(cell);
    });
    wm.appendChild(dr);blk.appendChild(wm);body.appendChild(blk);
  });
  renderSidebar();
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  // legend
  const leg=document.getElementById('legendList');leg.innerHTML='';
  const hint=document.createElement('div');hint.className='leg-hint';hint.textContent='Klikni alebo presuň na deň →';leg.appendChild(hint);
  TYPY.forEach(t=>{
    const row=document.createElement('div');row.className='leg-item';

function renderZDrop(q){
  const drop=document.getElementById('zakaznikDrop');

function saveEv(){
  const datum=document.getElementById('fD').value;
  if(!datum){alert('Vyplňte dátum.');return;}
  const datumDo=document.getElementById('fDD').value||null;
  const ev={
    id:editId||nextId(events),
    typ:selTyp||'ine',
    nazov:document.getElementById('fN').value.trim(),
    datum,datumDo:datumDo&&datumDo>datum?datumDo:null,
    casOd:document.getElementById('fCO').value||null,
    casDo:document.getElementById('fCD').value||null,
    kolegaIds:[...selPersonIds],
    zakaznikId:selZakaznikId,
    meradlaIds:[...selMeradlaIds],
    autoZnacka:document.getElementById('fAutoZn').value.trim()||null,
    autoSpz:document.getElementById('fAutoSpz').value.trim().toUpperCase()||null,
    dohladTyp:document.getElementById('fDohlad').value||null,
    miesto:document.getElementById('fMiesto').value.trim()||null,
    popis:document.getElementById('fP').value.trim()||null,
  };
  if(editId){const i=events.findIndex(e=>e.id===editId);if(i!==-1)events[i]=ev;}
  else{
    events.push(ev);
    // recurring copies
    const rec=document.getElementById('fRec').value;
    if(rec!=='none'){
      const cnt=Math.max(2,parseInt(document.getElementById('fRecCount').value)||4);
      for(let i=1;i<cnt;i++){
        let nd,ndd=null;
        if(rec==='monthly'){
          const d2=new Date(ev.datum+'T12:00:00');d2.setMonth(d2.getMonth()+i);nd=ds(d2);
          if(ev.datumDo){const dd2=new Date(ev.datumDo+'T12:00:00');dd2.setMonth(dd2.getMonth()+i);ndd=ds(dd2);}
        } else {
          const days=i*(rec==='weekly'?7:14);
          nd=addDays(ev.datum,days);ndd=ev.datumDo?addDays(ev.datumDo,days):null;
        }
        events.push({...ev,id:nextId(events),datum:nd,datumDo:ndd});
      }
    }
  }
  save(K_EV,events);
  // conflict check
  const conflicts=getConflicts(ev);
  if(conflicts.length){
    const names=(ev.kolegaIds||[]).map(id=>kById(id)).filter(Boolean).map(k=>k.meno).join(', ');
    const cList=conflicts.slice(0,3).map(c=>getTyp(c.typ).ikona+' '+fmtD(c.datum)+(c.nazov?' ('+c.nazov+')':'')).join('\n');
    setTimeout(()=>alert('⚠️ Možný konflikt pre: '+names+'\n\nStretáva sa s:\n'+cList+(conflicts.length>3?'\n…a ďalšie':'')),80);
  }
  closeM();render();
}

function getConflicts(ev){
  return events.filter(other=>{
    if(other.id===ev.id)return false;
    const shared=(ev.kolegaIds||[]).filter(id=>(other.kolegaIds||[]).includes(id));
    if(!shared.length)return false;
    const aS=ev.datum,aE=ev.datumDo||ev.datum,bS=other.datum,bE=other.datumDo||other.datum;
    return aS<=bE&&aE>=bS;
  });
}

function delEv(){
  if(!editId||!confirm('Vymazať túto udalosť?'))return;
  events=events.filter(e=>e.id!==editId);save(K_EV,events);closeM();render();
}

// ── REPORT ────────────────────────────────────────────────────────────────────
let repTab='people',repMonthVal='',repWeekStart='';

function addDays(dStr,n){const d=new Date(dStr+'T12:00:00');d.setDate(d.getDate()+n);return ds(d);}
function getWeekStartStr(d){const t=new Date(d);const day=t.getDay();t.setDate(t.getDate()+(day===0?-6:1-day));return ds(t);}

function openReport(){
  const now=new Date();
  repMonthVal=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  repWeekStart=getWeekStartStr(now);
  document.getElementById('tabPeople').classList.add('active');
  document.getElementById('tabWeek').classList.remove('active');
  repTab='people';
  renderRepCtrl();renderReport();
  document.getElementById('ovReport').classList.add('open');
}
function closeReport(){document.getElementById('ovReport').classList.remove('open');}

function switchRepTab(tab){
  repTab=tab;
  ['tabPeople','tabWeek','tabStats'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(tab==='people')document.getElementById('tabPeople').classList.add('active');
  else if(tab==='week')document.getElementById('tabWeek').classList.add('active');
  else document.getElementById('tabStats').classList.add('active');
  renderRepCtrl();renderReport();
}

function renderRepCtrl(){
  const c=document.getElementById('repCtrl');
  if(repTab==='week'){
    const wEnd=addDays(repWeekStart,6);
    const wNum=getISOWeek(new Date(repWeekStart+'T12:00:00'));
    c.innerHTML=`<button class="nav-btn" onclick="repWeekStart=addDays(repWeekStart,-7);renderRepCtrl();renderReport()">‹</button><span class="rep-wlabel">Týždeň ${wNum} &nbsp;(${fmtD(repWeekStart)} – ${fmtD(wEnd)})</span><button class="nav-btn" onclick="repWeekStart=addDays(repWeekStart,7);renderRepCtrl();renderReport()">›</button>`;
  } else {
    c.innerHTML=`<label>Mesiac:</label><input type="month" value="${repMonthVal}" onchange="repMonthVal=this.value;renderReport()">`;
  }
}

function renderReport(){
  if(repTab==='people')renderPeopleReport();
  else if(repTab==='week')renderWeekReport();
  else renderStatsReport();
}

function renderPeopleReport(){
  const body=document.getElementById('repBody');body.innerHTML='';
  if(!repMonthVal)return;
  const [yr,mo]=repMonthVal.split('-').map(Number);
  const first=`${repMonthVal}-01`,last=ds(new Date(yr,mo,0));
  const monthEvs=events.filter(ev=>{const s=ev.datum,en=ev.datumDo||ev.datum;return s<=last&&en>=first;});
  const DAYS_S=['Ne','Po','Ut','St','Št','Pi','So'];
  let hasAny=false;

  function buildEvRow(ev,showPersons){
    const typ=getTyp(ev.typ);
    const z=ev.zakaznikId?zById(ev.zakaznikId):null;
    const d=new Date(ev.datum+'T12:00:00');
    let dateStr=DAYS_S[d.getDay()]+' '+fmtD(ev.datum);
    if(ev.datumDo&&ev.datumDo!==ev.datum)dateStr+=' –\n'+fmtD(ev.datumDo);
    const subtyp=(ev.typ==='dohlad'&&ev.dohladTyp)?ev.dohladTyp:'';
    let sub=[];
    if(ev.miesto)sub.push('📍 '+ev.miesto);
    if(z)sub.push('🏢 '+z.nazov);
    if(ev.casOd){let t=ev.casOd.slice(0,5);if(ev.casDo)t+=' – '+ev.casDo.slice(0,5);sub.push('🕐 '+t);}
    const mList=(ev.meradlaIds||[]).map(id=>mById(id)).filter(Boolean);
    if(mList.length)sub.push('🔬 '+mList.map(m=>m.nazov).join(', '));
    if(ev.autoSpz)sub.push('🚗 '+ev.autoSpz);
    if(showPersons){const ps=evPersonNames(ev);if(ps)sub.push('👤 '+ps);}
    const row=document.createElement('div');row.className='rep-ev-row';
    row.onclick=()=>{closeReport();openEdit(ev.id);};
    const title=typ.label.replace('\n',' ')+(subtyp?' · '+subtyp:'')+(ev.nazov?' – '+ev.nazov:'');
    row.innerHTML=`<span class="rep-ev-date">${dateStr}</span><span class="rep-ev-icon">${typ.ikona}</span><div class="rep-ev-main"><span class="rep-ev-title">${title}</span>${sub.length?'<span class="rep-ev-sub">'+sub.join(' · ')+'</span>':''}</div>`;
    return row;
  }

  kolegovia.forEach(k=>{
    const kEvs=monthEvs.filter(ev=>(ev.kolegaIds||[]).includes(k.id)).sort((a,b)=>a.datum.localeCompare(b.datum));
    if(!kEvs.length)return;
    hasAny=true;
    const sec=document.createElement('div');sec.className='rep-person';
    const hdr=document.createElement('div');hdr.className='rep-person-hdr';
    hdr.innerHTML=`<span class="rep-person-dot" style="background:${k.farba}"></span><span class="rep-person-name">${k.meno}</span><span class="rep-person-count">${kEvs.length} udalost${kEvs.length===1?'':'í'}</span>`;
    sec.appendChild(hdr);
    kEvs.forEach(ev=>sec.appendChild(buildEvRow(ev,false)));
    body.appendChild(sec);
  });

  const unassigned=monthEvs.filter(ev=>!(ev.kolegaIds&&ev.kolegaIds.length)).sort((a,b)=>a.datum.localeCompare(b.datum));
  if(unassigned.length){
    hasAny=true;
    const sec=document.createElement('div');sec.className='rep-person';
    const hdr=document.createElement('div');hdr.className='rep-person-hdr';
    hdr.innerHTML=`<span class="rep-person-dot" style="background:#CBD5E0"></span><span class="rep-person-name" style="color:var(--muted)">Nepriradené</span><span class="rep-person-count">${unassigned.length}</span>`;
    sec.appendChild(hdr);
    unassigned.forEach(ev=>sec.appendChild(buildEvRow(ev,false)));
    body.appendChild(sec);
  }
  if(!hasAny){const em=document.createElement('p');em.className='rep-no-data';em.textContent='Žiadne udalosti v tomto mesiaci.';body.appendChild(em);}
}

function renderWeekReport(){
  const body=document.getElementById('repBody');body.innerHTML='';
  const DAYS_FULL=['Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota','Nedeľa'];
  const ts=tds();
  for(let i=0;i<7;i++){
    const dStr=addDays(repWeekStart,i);
    const d=new Date(dStr+'T12:00:00');
    const dayEvs=events.filter(ev=>{const s=ev.datum,en=ev.datumDo||ev.datum;return s<=dStr&&en>=dStr;}).sort((a,b)=>(a.casOd||'').localeCompare(b.casOd||''));
    const blk=document.createElement('div');blk.className='rep-day-block';
    const hdr=document.createElement('div');
    hdr.className='rep-day-hdr'+(i>=5?' we':'')+(dStr===ts?' tod':'');
    hdr.textContent=DAYS_FULL[i]+', '+d.getDate()+'. '+(d.getMonth()+1)+'. '+d.getFullYear();
    blk.appendChild(hdr);
    if(!dayEvs.length){
      const em=document.createElement('div');em.className='rep-empty-day';em.textContent='žiadne udalosti';blk.appendChild(em);
    } else {
      dayEvs.forEach(ev=>{
        const typ=getTyp(ev.typ);
        const persons=(ev.kolegaIds||[]).map(id=>kById(id)).filter(Boolean);
        const z=ev.zakaznikId?zById(ev.zakaznikId):null;
        const subtyp=(ev.typ==='dohlad'&&ev.dohladTyp)?ev.dohladTyp:'';
        let timeStr='';if(ev.casOd)timeStr=ev.casOd.slice(0,5);if(ev.casDo)timeStr+=' – '+ev.casDo.slice(0,5);
        let sub=[];
        if(ev.miesto)sub.push('📍 '+ev.miesto);
        if(z)sub.push('🏢 '+z.nazov);
        if(ev.autoSpz)sub.push('🚗 '+ev.autoSpz);
        const personHtml=persons.map(p=>`<span class="rep-person-mini" style="background:${p.farba}">${p.meno}</span>`).join('');
        const title=typ.label.replace('\n',' ')+(subtyp?' · '+subtyp:'')+(ev.nazov?' – '+ev.nazov:'');
        const row=document.createElement('div');row.className='rep-week-ev';
        row.onclick=()=>{closeReport();openEdit(ev.id);};
        row.innerHTML=`<span style="font-size:1.05rem;text-align:center;">${typ.ikona}</span><div class="rep-ev-main"><span class="rep-ev-title">${title}</span>${sub.length?'<span class="rep-ev-sub">'+sub.join(' · ')+'</span>':''}</div><div class="rep-persons-mini">${personHtml||'<span style="color:#CBD5E0;font-size:.75rem;">—</span>'}</div><span class="rep-time-cell">${timeStr}</span>`;
        blk.appendChild(row);
      });
    }
    body.appendChild(blk);
  }
}

// ── DAY DETAIL ────────────────────────────────────────────────────────────────
function openDayDetail(dStr){
  currentDetailDate=dStr;
  const d=new Date(dStr+'T12:00:00');
  const DAYS=['Nedeľa','Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota'];
  const MG=['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
  document.getElementById('dayDetailTitle').textContent=DAYS[d.getDay()]+' '+d.getDate()+'. '+MG[d.getMonth()]+' '+d.getFullYear();
  const body=document.getElementById('dayDetailBody');
  const dayEvs=events.filter(ev=>{const s=ev.datum,en=ev.datumDo||ev.datum;return s<=dStr&&en>=dStr;}).sort((a,b)=>(a.casOd||'').localeCompare(b.casOd||''));
  body.innerHTML='';
  if(!dayEvs.length){
    const em=document.createElement('p');em.className='no-data';em.innerHTML='Žiadne udalosti na tento deň.<br>Použi tlačidlo <b>+ Nová udalosť</b> alebo presuň typ / pracovníka zo sidebaru.';body.appendChild(em);
  } else {
    const wrap=document.createElement('div');wrap.className='day-detail-cards';
    dayEvs.forEach(ev=>{
      const typ=getTyp(ev.typ);
      const persons=(ev.kolegaIds||[]).map(id=>kById(id)).filter(Boolean);
      const z=ev.zakaznikId?zById(ev.zakaznikId):null;
      const mList=(ev.meradlaIds||[]).map(id=>mById(id)).filter(Boolean);
      let timeStr='';if(ev.casOd)timeStr=ev.casOd.slice(0,5);if(ev.casDo)timeStr+=' – '+ev.casDo.slice(0,5);
      let dateRange='';if(ev.datumDo&&ev.datumDo!==ev.datum)dateRange=fmtD(ev.datum)+' – '+fmtD(ev.datumDo);
      const subtyp=(ev.typ==='dohlad'&&ev.dohladTyp)?ev.dohladTyp:'';
      const card=document.createElement('div');card.className='ev-card';
      const hdr=document.createElement('div');hdr.className='ev-card-hdr';hdr.style.background=chipColor(ev);
      hdr.innerHTML='<span class="ev-card-icon">'+typ.ikona+'</span><span class="ev-card-type">'+typ.label.replace('\n',' ')+(subtyp?' · '+subtyp:'')+'</span><button class="ev-card-edit" onclick="closeDayDetail();openEdit('+ev.id+')">✏️ Upraviť</button>';
      const bod=document.createElement('div');bod.className='ev-card-body';
      if(ev.nazov){const n=document.createElement('div');n.className='ev-card-nazov';n.textContent=ev.nazov;bod.appendChild(n);}
      if(ev.miesto){const m=document.createElement('div');m.className='ev-card-detail';m.textContent='📍 '+ev.miesto;bod.appendChild(m);}
      if(timeStr){const t=document.createElement('div');t.className='ev-card-detail';t.textContent='🕐 '+timeStr;bod.appendChild(t);}
      if(dateRange){const dr2=document.createElement('div');dr2.className='ev-card-detail';dr2.textContent='📅 '+dateRange;bod.appendChild(dr2);}
      if(z){const zd=document.createElement('div');zd.className='ev-card-detail';zd.textContent='🏢 '+z.nazov+(z.ico?' ('+z.ico+')':'');bod.appendChild(zd);}
      if(persons.length){const pd=document.createElement('div');pd.className='ev-card-detail ev-card-persons';persons.forEach(p=>{const s=document.createElement('span');s.className='ev-card-person';s.style.background=p.farba;s.textContent=p.meno;pd.appendChild(s);});bod.appendChild(pd);}
      if(mList.length){const md=document.createElement('div');md.className='ev-card-detail';md.textContent='🔬 '+mList.map(m=>m.nazov+(m.inv?' ['+m.inv+']':'')).join(', ');bod.appendChild(md);}
      if(ev.autoZnacka||ev.autoSpz){const ad=document.createElement('div');ad.className='ev-card-detail';ad.textContent='🚗 '+(ev.autoZnacka||'')+(ev.autoSpz?' · '+ev.autoSpz:'');bod.appendChild(ad);}
      if(ev.popis){const pd=document.createElement('div');pd.className='ev-card-popis';pd.textContent=ev.popis;bod.appendChild(pd);}
      card.appendChild(hdr);card.appendChild(bod);wrap.appendChild(card);
    });
    body.appendChild(wrap);
  }
  document.getElementById('ovDay').classList.add('open');
}
function closeDayDetail(){document.getElementById('ovDay').classList.remove('open');}
function addEventForDay(){const d=currentDetailDate;closeDayDetail();openNew(d);}

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(){
  const data={events,kolegovia,zakaznici,meradla,exportedAt:new Date().toISOString(),version:2};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='planovac-zaloha-'+ds(new Date())+'.json';a.click();URL.revokeObjectURL(a.href);
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.events||!d.kolegovia)throw new Error('Neplatný formát zálohy');
      const dt=d.exportedAt?new Date(d.exportedAt).toLocaleString('sk'):'?';
      if(!confirm('Importovať zálohu z '+dt+'?\nVŠETKY aktuálne dáta budú nahradené!'))return;
      events=d.events||[];kolegovia=d.kolegovia||defaultK();zakaznici=d.zakaznici||[];meradla=d.meradla||[];
      save(K_EV,events);save(K_KL,kolegovia);save(K_ZA,zakaznici);save(K_ME,meradla);
      filterKolegaId=null;render();alert('✅ Import úspešný! Načítaných '+events.length+' udalostí.');
    }catch(err){alert('❌ Chyba importu: '+err.message);}
  };
  reader.readAsText(file);e.target.value='';
}

// ── FILTER BY PERSON ─────────────────────────────────────────────────────────
function setFilter(kid){filterKolegaId=(filterKolegaId===kid)?null:kid;render();}

// ── DUPLICATE EVENT ───────────────────────────────────────────────────────────
function dupEv(){
  const ev=events.find(e=>e.id===editId);if(!ev)return;
  closeM();openNew(null);
  selTyp=ev.typ;selPersonIds=[...(ev.kolegaIds||[])];selZakaznikId=ev.zakaznikId;selMeradlaIds=[...(ev.meradlaIds||[])];
  document.getElementById('fN').value=ev.nazov||'';document.getElementById('fMiesto').value=ev.miesto||'';
  document.getElementById('fD').value=ev.datum;document.getElementById('fDD').value=ev.datumDo||'';
  document.getElementById('fCO').value=ev.casOd||'';document.getElementById('fCD').value=ev.casDo||'';
  document.getElementById('fP').value=ev.popis||'';document.getElementById('fAutoZn').value=ev.autoZnacka||'';
  document.getElementById('fAutoSpz').value=ev.autoSpz||'';document.getElementById('fDohlad').value=ev.dohladTyp||'';
  selectTyp(ev.typ);renderSelZakaznik();renderSelMeradla();buildPersonChips();
  document.getElementById('mT').textContent='📋 Kópia udalosti';
  setTimeout(()=>{document.getElementById('fD').focus();},100);
}

// ── STATISTICS ────────────────────────────────────────────────────────────────
function renderStatsReport(){
  const body=document.getElementById('repBody');body.innerHTML='';
  if(!repMonthVal)return;
  const [yr,mo]=repMonthVal.split('-').map(Number);
  const first=`${repMonthVal}-01`,last=ds(new Date(yr,mo,0));
  const mEvs=events.filter(ev=>{const s=ev.datum,en=ev.datumDo||ev.datum;return s<=last&&en>=first;});
  const h1=document.createElement('div');h1.className='stat-section-hdr';h1.textContent='Pracovníci – '+MONTHS[mo-1]+' '+yr;body.appendChild(h1);
  const maxK=Math.max(1,...kolegovia.map(k=>mEvs.filter(ev=>(ev.kolegaIds||[]).includes(k.id)).length));
  kolegovia.forEach(k=>{
    const cnt=mEvs.filter(ev=>(ev.kolegaIds||[]).includes(k.id)).length;
    if(!cnt)return;
    const r=document.createElement('div');r.className='stat-row';
    r.innerHTML=`<span class="stat-name">${k.meno}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round(cnt/maxK*100)}%;background:${k.farba}">${cnt}</div></div><span class="stat-val">${cnt}</span>`;
    body.appendChild(r);
  });
  const h2=document.createElement('div');h2.className='stat-section-hdr';h2.textContent='Typy udalostí';body.appendChild(h2);
  const tCounts=TYPY.map(t=>({t,cnt:mEvs.filter(ev=>ev.typ===t.id).length})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const maxT=Math.max(1,...tCounts.map(x=>x.cnt));
  tCounts.forEach(({t,cnt})=>{
    const r=document.createElement('div');r.className='stat-row';
    const lbl=t.ikona+' '+t.label.replace('\n',' ');
    r.innerHTML=`<span class="stat-name" title="${lbl}">${t.ikona} ${t.label.split('\n')[0]}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round(cnt/maxT*100)}%;background:${t.farba}">${cnt}</div></div><span class="stat-val">${cnt}</span>`;
    body.appendChild(r);
  });
  if(!mEvs.length){const em=document.createElement('p');em.className='rep-no-data';em.textContent='Žiadne udalosti v tomto mesiaci.';body.appendChild(em);}
}

// ── YEAR VIEW ─────────────────────────────────────────────────────────────────
function openYearView(){yearViewYear=curY;renderYearView();document.getElementById('ovYear').classList.add('open');}
function closeYearView(){document.getElementById('ovYear').classList.remove('open');}
function chYearView(d){yearViewYear+=d;renderYearView();}
function renderYearView(){
  document.getElementById('yearViewTitle').textContent=yearViewYear;
  const grid=document.getElementById('yearGrid');grid.innerHTML='';
  const ts=tds();
  for(let m=0;m<12;m++){
    const mini=document.createElement('div');mini.className='mini-cal'+(yearViewYear===curY&&m===curM?' cur-m':'');
    mini.onclick=()=>{closeYearView();curY=yearViewYear;curM=m;render();};
    const mh=document.createElement('div');mh.className='mini-cal-hdr';mh.textContent=MONTHS[m]+' '+yearViewYear;mini.appendChild(mh);
    const mg=document.createElement('div');mg.className='mini-cal-grid';
    ['P','U','S','Š','P','S','N'].forEach(dl=>{const h=document.createElement('div');h.className='mini-d';h.style.cssText='color:#94A3B8;font-size:.48rem;';h.textContent=dl;mg.appendChild(h);});
    getWeeks(yearViewYear,m).forEach(week=>{
      week.forEach((d,i)=>{
        const dStr=ds(d),isOM=d.getMonth()!==m,isWE=i>=5;
        const hasEv=!isOM&&events.some(ev=>{const s=ev.datum,en=ev.datumDo||ev.datum;return s<=dStr&&en>=dStr;});
        const isT=dStr===ts;
        const el=document.createElement('div');
        el.className='mini-d'+(isOM?' om':'')+(isT?' is-tod':hasEv?' has-ev':isWE?' we':'');
        el.textContent=isOM?'':d.getDate();mg.appendChild(el);
      });
    });
    mini.appendChild(mg);grid.appendChild(mini);
  }
}

// ── KIOSK / PRESENTATION ─────────────────────────────────────────────────────
function enterKiosk(){
  document.body.classList.add('kiosk');
  document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().catch(()=>{});
  document.getElementById('kioskBar').style.display='flex';
  document.getElementById('btnExitKiosk').style.display='';
  kioskInterval=setInterval(updateKioskClock,1000);updateKioskClock();render();
}
function exitKiosk(){
  document.body.classList.remove('kiosk');
  document.fullscreenElement&&document.exitFullscreen&&document.exitFullscreen().catch(()=>{});
  document.getElementById('kioskBar').style.display='none';
  document.getElementById('btnExitKiosk').style.display='none';
  clearInterval(kioskInterval);kioskInterval=null;render();
}
function updateKioskClock(){
  const now=new Date();
  const DAYS_SK=['Nedeľa','Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota'];
  const MG_SK=['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
  document.getElementById('kioskTime').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('kioskDateTxt').textContent=DAYS_SK[now.getDay()]+', '+now.getDate()+'. '+MG_SK[now.getMonth()]+' '+now.getFullYear();
}
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&document.body.classList.contains('kiosk'))exitKiosk();});

// ── NAV ───────────────────────────────────────────────────────────────────────
function chM(d){curM+=d;if(curM<0){curM=11;curY--;}if(curM>11){curM=0;curY++;}render();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('hidden');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeM();closeDayDetail();closeReport();closeYearView();document.getElementById('ovAuto').classList.remove('open');return;}const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;if(e.key==='n'||e.key==='N'){openNew();return;}if(e.key==='ArrowLeft'){chM(-1);return;}if(e.key==='ArrowRight'){chM(1);return;}if(e.key==='r'||e.key==='R'){openReport();return;}if(e.key==='y'||e.key==='Y'){openYearView();return;}if(e.key==='f'||e.key==='F'){document.fullscreenElement?exitKiosk():enterKiosk();return;}});

render();
</script>
