<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plánovač aktivít</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --border: #B0B8C4;
  --border-light: #D8DDE4;
  --bg: #F3F5F7;
  --white: #FFFFFF;
  --text: #1A202C;
  --muted: #6B7280;
  --today-bg: #EFF6FF;
  --blue: #2563EB;
  --red: #DC2626;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,.10);
  --week-col: 40px;
}

body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: #1E293B; color: #fff;
  padding: 0 16px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
header h1 { font-size: .95rem; font-weight: 700; }
.btn-new {
  background: var(--blue); color: #fff; border: none;
  border-radius: 7px; padding: 7px 14px;
  font-size: .82rem; font-weight: 700; cursor: pointer;
}

.wrap {
  max-width: 1280px; margin: 0 auto; padding: 14px 12px;
  display: grid; grid-template-columns: 1fr 250px; gap: 14px;
}
@media(max-width: 820px) { .wrap { grid-template-columns: 1fr; } .sidebar { order: -1; } }

/* ── CALENDAR ── */
.cal-card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border-light); overflow: hidden;
}
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; border-bottom: 2px solid var(--border); background: #F8FAFC;
}
.cal-nav h2 { font-size: 1.05rem; font-weight: 800; color: var(--red); text-transform: uppercase; letter-spacing: -.3px; }
.nav-btn {
  width: 30px; height: 30px; border: 1px solid var(--border); background: var(--white);
  border-radius: 6px; cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center; color: var(--muted);
}
.nav-btn:hover { border-color: var(--blue); color: var(--blue); }

.cal-dow {
  display: grid; grid-template-columns: var(--week-col) repeat(7, 1fr);
  border-bottom: 2px solid var(--border); background: #F8FAFC;
}
.dow-sp { border-right: 2px solid var(--border); }
.dow-lbl {
  text-align: center; font-size: .68rem; font-weight: 800;
  padding: 5px 2px; letter-spacing: .6px; text-transform: uppercase; color: var(--muted);
  border-right: 1px solid var(--border-light);
}
.dow-lbl:last-child { border-right: none; }
.dow-lbl.we { color: var(--red); }

/* week block */
.week-block {
  display: grid; grid-template-columns: var(--week-col) 1fr;
  border-bottom: 1px solid var(--border); min-height: 80px;
}
.week-block:last-child { border-bottom: none; }
.wnum {
  border-right: 2px solid var(--border);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 7px; font-size: .66rem; font-weight: 800; color: #94A3B8;
}
.wmain { display: flex; flex-direction: column; }

.span-area {
  display: grid; grid-template-columns: repeat(7, 1fr); padding: 2px 0 0;
}
.span-area:empty { display: none; }
.span-ev {
  margin: 1px 2px; border-radius: 3px;
  font-size: .68rem; font-weight: 700; color: #fff;
  padding: 2px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; line-height: 1.5; align-self: center;
}
.span-ev:hover { opacity: .82; }
.cl { border-radius: 0 3px 3px 0; }
.cr { border-radius: 3px 0 0 3px; }
.cb { border-radius: 0; }

.days-row { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; }
.day-cell {
  border-right: 1px solid var(--border-light);
  padding: 3px 3px 4px; cursor: pointer; min-height: 55px;
  transition: background .1s; position: relative;
}
.day-cell:last-child { border-right: none; }
.day-cell.we {
  background: repeating-linear-gradient(135deg, rgba(0,0,0,.04), rgba(0,0,0,.04) 3px, transparent 3px, transparent 10px);
  background-color: #FAFBFC;
}
.day-cell.om { opacity: .4; }
.day-cell.tod { background: var(--today-bg) !important; }
.day-cell:hover:not(.we) { background: #F0F7FF; }

.day-cell.tod::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2.5px; background: var(--red);
}

.dnum-wrap { display: flex; justify-content: flex-end; margin-bottom: 2px; }
.dnum {
  font-size: .72rem; font-weight: 700; color: var(--muted);
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.we .dnum { color: var(--red); }
.tod .dnum { background: var(--blue); color: #fff; }
.om .dnum { color: #CBD5E0; }

.s-ev {
  display: block; font-size: .65rem; font-weight: 600;
  padding: 1px 4px; border-radius: 3px; margin-bottom: 2px;
  color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; line-height: 1.5;
}
.more-lbl { font-size: .6rem; color: var(--muted); padding-left: 2px; }

/* ── SIDEBAR ── */
.sidebar { display: flex; flex-direction: column; gap: 12px; }
.panel {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border-light); overflow: hidden;
}
.phdr {
  padding: 9px 13px; font-size: .68rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
  border-bottom: 1px solid var(--border-light); background: #F8FAFC;
}
.pbody { padding: 10px 11px; }

.k-row { display: flex; align-items: center; gap: 7px; padding: 5px 5px; border-radius: 6px; }
.k-row:hover { background: var(--bg); }
.k-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.k-name { font-size: .84rem; font-weight: 500; flex: 1; }
.k-del { border: none; background: none; color: #CBD5E0; cursor: pointer; border-radius: 4px; font-size: .8rem; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
.k-del:hover { background: #FEE2E2; color: var(--red); }

.add-k { display: flex; gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-light); }
.add-k input[type=text] { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 5px 7px; font-size: .8rem; outline: none; }
.add-k input[type=text]:focus { border-color: var(--blue); }
.add-k input[type=color] { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; padding: 2px; cursor: pointer; }
.btn-add { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 5px 9px; font-size: .8rem; font-weight: 700; cursor: pointer; }

.upc-item { display: flex; gap: 9px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
.upc-item:last-child { border-bottom: none; }
.upc-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }
.upc-dt { min-width: 34px; text-align: center; background: #EFF6FF; border-radius: 6px; padding: 3px 2px; }
.upc-d { font-size: .9rem; font-weight: 800; color: var(--blue); line-height: 1; }
.upc-m { font-size: .58rem; font-weight: 700; color: var(--blue); text-transform: uppercase; }
.upc-info { flex: 1; min-width: 0; }
.upc-t { font-size: .82rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upc-s { font-size: .69rem; color: var(--muted); margin-top: 1px; }
.empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 10px 0; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 200; align-items: center; justify-content: center; padding: 14px; }
.overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 14px; width: 100%; max-width: 450px; box-shadow: 0 24px 64px rgba(0,0,0,.22); animation: pop .18s ease; }
@keyframes pop { from { transform: scale(.95) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.mhdr { padding: 14px 16px 11px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
.mhdr h3 { font-size: .92rem; font-weight: 800; }
.mx { width: 26px; height: 26px; border: none; background: var(--bg); border-radius: 6px; cursor: pointer; font-size: .95rem; display: flex; align-items: center; justify-content: center; color: var(--muted); }
.mbody { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.mftr { padding: 11px 16px; border-top: 1px solid var(--border-light); display: flex; gap: 7px; justify-content: flex-end; }

.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: .69rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.fg input, .fg select, .fg textarea { border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 10px; font-size: .86rem; font-family: inherit; outline: none; color: var(--text); }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--blue); }
.fg textarea { min-height: 56px; resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

.bp { background: var(--blue); color: #fff; border: none; border-radius: 7px; padding: 8px 16px; font-size: .86rem; font-weight: 700; cursor: pointer; }
.bp:hover { background: #1D4ED8; }
.bs { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: 8px 13px; font-size: .86rem; font-weight: 600; cursor: pointer; }
.bd { background: #FEE2E2; color: var(--red); border: none; border-radius: 7px; padding: 8px 13px; font-size: .86rem; font-weight: 700; cursor: pointer; margin-right: auto; }
</style>
</head>
<body>

<header>
  <h1>📋 Plánovač aktivít</h1>
  <button class="btn-new" onclick="openNew()">+ Nová udalosť</button>
</header>

<div class="wrap">
  <div class="cal-card">
    <div class="cal-nav">
      <button class="nav-btn" onclick="chM(-1)">‹</button>
      <h2 id="mTitle"></h2>
      <button class="nav-btn" onclick="chM(1)">›</button>
    </div>
    <div class="cal-dow">
      <div class="dow-sp"></div>
      <div class="dow-lbl">Po</div><div class="dow-lbl">Ut</div>
      <div class="dow-lbl">St</div><div class="dow-lbl">Št</div>
      <div class="dow-lbl">Pi</div>
      <div class="dow-lbl we">So</div><div class="dow-lbl we">Ne</div>
    </div>
    <div id="calBody"></div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="phdr">Kolegovia</div>
      <div class="pbody">
        <div id="kList"></div>
        <div class="add-k">
          <input type="text" id="newMeno" placeholder="Meno…">
          <input type="color" id="newFarba" value="#2563EB">
          <button class="btn-add" onclick="addK()">+</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="phdr">Najbližšie udalosti</div>
      <div class="pbody" id="upcoming"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov" onclick="ovBg(event)">
  <div class="modal">
    <div class="mhdr">
      <h3 id="mT">Nová udalosť</h3>
      <button class="mx" onclick="closeM()">✕</button>
    </div>
    <div class="mbody">
      <div class="fg"><label>Názov *</label><input type="text" id="fN" placeholder="Napr. Porada, Dovolenka, Servis…"></div>
      <div class="row2">
        <div class="fg"><label>Dátum od *</label><input type="date" id="fD"></div>
        <div class="fg"><label>Dátum do</label><input type="date" id="fDD" placeholder="(viac dní)"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Čas od</label><input type="time" id="fCO"></div>
        <div class="fg"><label>Čas do</label><input type="time" id="fCD"></div>
      </div>
      <div class="fg"><label>Kolega</label><select id="fK"><option value="">— nikto —</option></select></div>
      <div class="fg"><label>Poznámka</label><textarea id="fP" placeholder="Voliteľný popis…"></textarea></div>
    </div>
    <div class="mftr">
      <button class="bd" id="btnDel" onclick="delEv()" style="display:none">Vymazať</button>
      <button class="bs" onclick="closeM()">Zrušiť</button>
      <button class="bp" onclick="saveEv()">Uložiť</button>
    </div>
  </div>
</div>

<script>
// ── storage ───────────────────────────────────────────────────────────────────
const KEY_EV = 'planovac_events';
const KEY_KL = 'planovac_kolegovia';

function loadEvents()    { try { return JSON.parse(localStorage.getItem(KEY_EV) || '[]'); } catch(e) { return []; } }
function saveEvents(d)   { localStorage.setItem(KEY_EV, JSON.stringify(d)); }
function loadKolegovia() { try { return JSON.parse(localStorage.getItem(KEY_KL) || 'null') || defaultK(); } catch(e) { return defaultK(); } }
function saveKolegovia(d){ localStorage.setItem(KEY_KL, JSON.stringify(d)); }

function defaultK() {
  return [
    { id: 1, meno: 'Kolega 1', farba: '#2563EB' },
    { id: 2, meno: 'Kolega 2', farba: '#DC2626' },
    { id: 3, meno: 'Kolega 3', farba: '#16A34A' },
  ];
}

function nextId(arr) { return arr.length ? Math.max(...arr.map(x=>x.id)) + 1 : 1; }

// ── state ─────────────────────────────────────────────────────────────────────
const today = new Date();
let curY = today.getFullYear(), curM = today.getMonth();
let events = loadEvents(), kolegovia = loadKolegovia();
let editId = null;

const MONTHS  = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];
const MONTHS3 = ['jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec'];

// ── helpers ───────────────────────────────────────────────────────────────────
function ds(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function tds() { return ds(today); }

function getISOWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
  const y = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return Math.ceil((((t-y)/86400000)+1)/7);
}

function getWeeks(year, month) {
  const first = new Date(year, month, 1);
  let dow = first.getDay(); if (dow===0) dow=7;
  const mon = new Date(year, month, 2-dow);
  const last = new Date(year, month+1, 0);
  const weeks = []; let ws = new Date(mon);
  while (ws <= last) {
    const w = []; for (let i=0;i<7;i++){ const d=new Date(ws); d.setDate(ws.getDate()+i); w.push(d); } weeks.push(w);
    ws.setDate(ws.getDate()+7);
  }
  return weeks;
}

function kById(id) { return kolegovia.find(k => k.id == id); }

function assignTracks(evs) {
  const sorted = [...evs].sort((a,b)=>a.datum.localeCompare(b.datum));
  const tEnds = []; const res = [];
  for (const ev of sorted) {
    const end = ev.datumDo || ev.datum;
    let t = tEnds.findIndex(e => e < ev.datum);
    if (t===-1) { t=tEnds.length; tEnds.push(null); }
    tEnds[t] = end; res.push({...ev, track: t});
  }
  return { items: res, num: tEnds.length };
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('mTitle').textContent = `${MONTHS[curM]} ${curY}`;
  const body = document.getElementById('calBody');
  body.innerHTML = '';

  const weeks = getWeeks(curY, curM);
  const ts = tds();

  // index single-day events
  const byDate = {};
  const multiDay = [];
  events.forEach(ev => {
    if (!ev.datumDo || ev.datumDo === ev.datum) {
      (byDate[ev.datum] = byDate[ev.datum] || []).push(ev);
    } else {
      multiDay.push(ev);
    }
  });

  // filter to current month range
  const firstDay = `${curY}-${String(curM+1).padStart(2,'0')}-01`;
  const lastDay = ds(new Date(curY, curM+1, 0));

  weeks.forEach(week => {
    const wS = ds(week[0]), wE = ds(week[6]);
    const overlap = multiDay.filter(ev => ev.datum <= wE && (ev.datumDo||ev.datum) >= wS && ev.datum <= lastDay && (ev.datumDo||ev.datum) >= firstDay);
    const { items: tracked, num: numT } = assignTracks(overlap);

    const blk = document.createElement('div');
    blk.className = 'week-block';

    const wn = document.createElement('div');
    wn.className = 'wnum';
    wn.textContent = getISOWeek(week[0]);
    blk.appendChild(wn);

    const wm = document.createElement('div');
    wm.className = 'wmain';

    if (numT > 0) {
      const sa = document.createElement('div');
      sa.className = 'span-area';
      sa.style.gridTemplateRows = `repeat(${numT}, 20px)`;
      sa.style.height = (numT*22+4)+'px';
      tracked.forEach(ev => {
        const evS = ev.datum > wS ? ev.datum : wS;
        const evE = (ev.datumDo||ev.datum) < wE ? (ev.datumDo||ev.datum) : wE;
        const cS = week.findIndex(d=>ds(d)===evS);
        const cE = week.findIndex(d=>ds(d)===evE);
        if (cS===-1||cE===-1) return;
        const chip = document.createElement('div');
        chip.className = 'span-ev';
        const cl = ev.datum < wS, cr = (ev.datumDo||ev.datum) > wE;
        if (cl&&cr) chip.classList.add('cb');
        else if (cl) chip.classList.add('cl');
        else if (cr) chip.classList.add('cr');
        chip.style.gridColumn = `${cS+1}/${cE+2}`;
        chip.style.gridRow = ev.track+1;
        const k = kById(ev.kolegaId);
        chip.style.background = k ? k.farba : '#6B7280';
        chip.textContent = (cl?'◂ ':'')+ev.nazov+(cr?' ▸':'');
        chip.onclick = e => { e.stopPropagation(); openEdit(ev.id); };
        sa.appendChild(chip);
      });
      wm.appendChild(sa);
    }

    const dr = document.createElement('div');
    dr.className = 'days-row';
    week.forEach((d, idx) => {
      const dStr = ds(d);
      const isOM = d.getMonth()!==curM;
      const isWE = idx>=5;
      const isT  = dStr===ts;
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isWE?' we':'') + (isOM?' om':'') + (isT?' tod':'');
      const nw = document.createElement('div'); nw.className = 'dnum-wrap';
      const num = document.createElement('span'); num.className = 'dnum';
      num.textContent = d.getDate();
      nw.appendChild(num); cell.appendChild(nw);
      (byDate[dStr]||[]).slice(0,3).forEach(ev => {
        const chip = document.createElement('span');
        chip.className = 's-ev';
        const k = kById(ev.kolegaId);
        chip.style.background = k ? k.farba : '#6B7280';
        chip.textContent = (ev.casOd?ev.casOd.slice(0,5)+' ':'')+ev.nazov;
        chip.onclick = e => { e.stopPropagation(); openEdit(ev.id); };
        cell.appendChild(chip);
      });
      const rest = (byDate[dStr]||[]).length - 3;
      if (rest > 0) { const m=document.createElement('span'); m.className='more-lbl'; m.textContent=`+${rest}`; cell.appendChild(m); }
      cell.onclick = () => openNew(dStr);
      dr.appendChild(cell);
    });
    wm.appendChild(dr);
    blk.appendChild(wm);
    body.appendChild(blk);
  });

  renderK();
  renderUpcoming();
}

function renderK() {
  const list = document.getElementById('kList');
  list.innerHTML = '';
  kolegovia.forEach(k => {
    const r = document.createElement('div'); r.className = 'k-row';
    r.innerHTML = `<span class="k-dot" style="background:${k.farba}"></span><span class="k-name">${k.meno}</span><button class="k-del" onclick="delK(${k.id})">✕</button>`;
    list.appendChild(r);
  });
  // rebuild select
  const sel = document.getElementById('fK');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— nikto —</option>';
  kolegovia.forEach(k => { const o=document.createElement('option'); o.value=k.id; o.textContent=k.meno; sel.appendChild(o); });
  if (cur) sel.value = cur;
}

function renderUpcoming() {
  const list = document.getElementById('upcoming');
  list.innerHTML = '';
  const t = tds();
  const soon = events.filter(ev=>(ev.datumDo||ev.datum)>=t).sort((a,b)=>a.datum.localeCompare(b.datum)).slice(0,7);
  if (!soon.length) { list.innerHTML='<p class="empty">Žiadne nadchádzajúce udalosti</p>'; return; }
  soon.forEach(ev => {
    const d = new Date(ev.datum+'T12:00:00');
    const k = kById(ev.kolegaId);
    const item = document.createElement('div'); item.className='upc-item';
    const range = ev.datumDo ? `${d.getDate()}. ${MONTHS3[d.getMonth()]}–${new Date(ev.datumDo+'T12:00:00').getDate()}. ${MONTHS3[new Date(ev.datumDo+'T12:00:00').getMonth()]}` : '';
    const time = ev.casOd ? ev.casOd.slice(0,5) : '';
    item.innerHTML = `
      <div class="upc-bar" style="background:${k?k.farba:'#CBD5E0'}"></div>
      <div class="upc-dt"><div class="upc-d">${d.getDate()}</div><div class="upc-m">${MONTHS3[d.getMonth()]}</div></div>
      <div class="upc-info">
        <div class="upc-t">${ev.nazov}</div>
        <div class="upc-s">${range||time||''}${(range||time)&&k?' · ':''}${k?k.meno:''}</div>
      </div>`;
    item.onclick = () => openEdit(ev.id);
    list.appendChild(item);
  });
}

// ── modal ─────────────────────────────────────────────────────────────────────
function openNew(dateStr) {
  editId = null;
  document.getElementById('mT').textContent = 'Nová udalosť';
  document.getElementById('fN').value = '';
  document.getElementById('fD').value = dateStr || tds();
  document.getElementById('fDD').value = '';
  document.getElementById('fCO').value = '';
  document.getElementById('fCD').value = '';
  document.getElementById('fK').value = '';
  document.getElementById('fP').value = '';
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('fN').focus(), 60);
}

function openEdit(id) {
  const ev = events.find(e=>e.id===id);
  if (!ev) return;
  editId = id;
  document.getElementById('mT').textContent = 'Upraviť udalosť';
  document.getElementById('fN').value = ev.nazov;
  document.getElementById('fD').value = ev.datum;
  document.getElementById('fDD').value = ev.datumDo || '';
  document.getElementById('fCO').value = ev.casOd || '';
  document.getElementById('fCD').value = ev.casDo || '';
  document.getElementById('fK').value = ev.kolegaId || '';
  document.getElementById('fP').value = ev.popis || '';
  document.getElementById('btnDel').style.display = 'block';
  document.getElementById('ov').classList.add('open');
}

function closeM() { document.getElementById('ov').classList.remove('open'); }
function ovBg(e) { if (e.target===document.getElementById('ov')) closeM(); }

function saveEv() {
  const nazov = document.getElementById('fN').value.trim();
  const datum  = document.getElementById('fD').value;
  if (!nazov||!datum) { alert('Vyplňte aspoň názov a dátum.'); return; }
  const datumDo = document.getElementById('fDD').value || null;
  const ev = {
    id: editId || nextId(events),
    nazov, datum,
    datumDo: datumDo && datumDo > datum ? datumDo : null,
    casOd: document.getElementById('fCO').value || null,
    casDo: document.getElementById('fCD').value || null,
    kolegaId: document.getElementById('fK').value ? +document.getElementById('fK').value : null,
    popis: document.getElementById('fP').value.trim() || null,
  };
  if (editId) {
    const i = events.findIndex(e=>e.id===editId);
    if (i!==-1) events[i] = ev;
  } else {
    events.push(ev);
  }
  saveEvents(events);
  closeM();
  render();
}

function delEv() {
  if (!editId||!confirm('Vymazať túto udalosť?')) return;
  events = events.filter(e=>e.id!==editId);
  saveEvents(events);
  closeM();
  render();
}

// ── kolegovia ─────────────────────────────────────────────────────────────────
function addK() {
  const meno = document.getElementById('newMeno').value.trim();
  if (!meno) return;
  const farba = document.getElementById('newFarba').value;
  kolegovia.push({ id: nextId(kolegovia), meno, farba });
  saveKolegovia(kolegovia);
  document.getElementById('newMeno').value = '';
  render();
}

function delK(id) {
  if (!confirm('Odstrániť kolegu?')) return;
  kolegovia = kolegovia.filter(k=>k.id!==id);
  events = events.map(ev => ev.kolegaId===id ? {...ev, kolegaId:null} : ev);
  saveKolegovia(kolegovia); saveEvents(events);
  render();
}

// ── nav ───────────────────────────────────────────────────────────────────────
function chM(d) {
  curM += d;
  if (curM<0) { curM=11; curY--; }
  if (curM>11) { curM=0; curY++; }
  render();
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeM(); });

// ── init ──────────────────────────────────────────────────────────────────────
render();
</script>
